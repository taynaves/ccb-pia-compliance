async function doGenerateReport() {
  const sel = document.querySelector('input[name="rpt-type"]:checked')?.value || "pdf";
  closeModal();
  toast("Gerando relatório…");
  try {
    const code     = await getOrCreateReportCode();
    const prtCount = await getNextPrintCount(code);
    const version  = S.checklist.data?.version || 1;
    const now      = new Date();
    const stamp    = `${code} | ${version > 1 ? ordinal(version)+" versão — " : ""}${ordinal(prtCount)} ${prtCount === 1 ? "Impressão" : "Reimpressão"} | ${now.toLocaleString("pt-BR")}`;
    const ctx = buildReportContext(code, stamp, now, prtCount, version);
    if (sel === "pdf" || sel === "both") { await generateJsPDF(ctx); }
    if (sel === "md"  || sel === "both") { downloadMDFile(ctx); }
    if (sel === "drive") { await saveMDToDrive(ctx); }
    setTimeout(loadHistory, 500);
  } catch(e) {
    console.error("Erro ao gerar relatório:", e);
    toast("Erro ao gerar relatório: " + (e.message || e), "err");
  }
}

function buildReportContext(code, stamp, now, prtCount, version) {
  const data = S.checklist.data || {};
  const ctx  = S.context || {};
  const f    = data.fields || {};
  const items = data.items || {};
  const month = f.mes || new Date().toISOString().slice(0,7);
  let monthLabel = month;
  try { monthLabel = new Date(month+"-01T12:00").toLocaleDateString("pt-BR",{month:"long",year:"numeric"}); } catch{}
  // Classificar itens
  const naBySection = {}, pendBySection = {};
  ITEMS.forEach(([id, num, mom, acao, secIdx]) => {
    const key = String(id).padStart(3,"0");
    const status = items[key]?.status || "";
    const obs    = items[key]?.obs || "";
    if (status === "NA") {
      if (!naBySection[secIdx]) naBySection[secIdx] = [];
      naBySection[secIdx].push({ id, num, acao });
    } else if (status === "PEND" || status === "") {
      // PEND-B: item sem resposta entra como "pendente" APENAS no relatório
      // (não grava no Firebase). auto=true marca os que ficaram sem resposta.
      if (!pendBySection[secIdx]) pendBySection[secIdx] = [];
      pendBySection[secIdx].push({ id, num, acao, obs, auto: status === "" });
    }
  });
  return { data, ctx, f, items, month, monthLabel, code, stamp, now, prtCount, version, naBySection, pendBySection };
}

// ── Carregamento da imagem CCB para o PDF ───────────────────
async function loadImgB64(url) {
  return new Promise(resolve => {
    const img = new Image(); img.crossOrigin = "anonymous";
    img.onload = function() {
      const c = document.createElement("canvas");
      c.width = this.width; c.height = this.height;
      c.getContext("2d").drawImage(this, 0, 0);
      resolve(c.toDataURL("image/png"));
    };
    img.onerror = () => resolve(null);
    img.src = url;
  });
}

// ── Cabeçalho do relatório: imagem pronta carregada do repositório ─────
// (ARQ-02: imagem fora do index.html; carregada em runtime e cacheada)
// _cacheBust muda a cada carregamento da página (F5/novo login) → força o
// navegador a buscar a versão mais nova da imagem quando ela é trocada no
// repositório, evitando exibir uma cópia velha do cache do navegador.
const _cacheBust = Date.now();
let _pdfHeaderImg = null;
function loadPdfHeaderImg() {
  if (_pdfHeaderImg) return Promise.resolve(_pdfHeaderImg);
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload  = () => { _pdfHeaderImg = img; resolve(img); };
    img.onerror = () => reject(new Error("Falha ao carregar assets/pdf_header.jpg"));
    img.src = "assets/pdf_header.jpg?v=" + _cacheBust;
  });
}

// ── GERAÇÃO DO PDF COM jsPDF ────────────────────────────────
async function generateJsPDF(rc) {
  if (!window.jspdf) {
    toast("⚠ jsPDF não carregou. Verifique sua conexão e recarregue a página.\nAlternativa: use a opção .md (Baixar Markdown).","err");
    return;
  }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
  const CW = 210, ML = 14, MR = 196, BW = MR - ML;
  let y = 0;

  // ── Cabeçalho: imagem pronta ocupando a largura da página ──────────────
  // A altura é derivada da proporção REAL da imagem carregada, então o sistema
  // se adapta sozinho se a imagem for trocada por outra de tamanho diferente.
  const appVer = (window.APP_CONFIG||{}).APP_VERSION || "2.0";
  let hdrH = 26;   // fallback caso a imagem não carregue
  try {
    const hdrImg = await loadPdfHeaderImg();
    hdrH = CW * (hdrImg.naturalHeight / hdrImg.naturalWidth);
    doc.addImage(hdrImg, "JPEG", 0, 0, CW, hdrH);
  } catch (e) {
    // Fallback (ARQ-04/05): sem a imagem o relatório ainda é gerado, com aviso
    doc.setFillColor(31, 58, 95); doc.rect(0, 0, CW, hdrH, "F");
    doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(12);
    doc.text("CONGREGAÇÃO CRISTÃ NO BRASIL", 8, 11);
    doc.setFont("helvetica","normal"); doc.setFontSize(9);
    doc.text("Checklist Mensal de Compliance — Secretaria da Piedade", 8, 17);
    toast("⚠ Imagem do cabeçalho não carregou; usando cabeçalho simples.", "err");
  }
  y = hdrH + 8;

  // ── Título + identificação (bloco redesenhado, R3) ─────────────────────
  const dtEnc = rc.f.dataEnc ? new Date(rc.f.dataEnc+"T12:00").toLocaleDateString("pt-BR") : "—";
  const pubAt = rc.data.publishedAt ? new Date(rc.data.publishedAt).toLocaleString("pt-BR") : "—";
  const statusStr = rc.data.status === "publicado" ? `Publicado em ${pubAt}` : "Rascunho / Em revisão";

  // Título (esq.) + hierarquia RRM › RML no canto superior direito (longe do Ponto)
  doc.setTextColor(31,58,95); doc.setFont("helvetica","bold"); doc.setFontSize(11);
  doc.text("RELATÓRIO DE FECHAMENTO — CHECKLIST COMPLIANCE", ML, y);
  doc.setFont("helvetica","normal"); doc.setFontSize(6); doc.setTextColor(130,130,130);
  doc.text("REGIONAL (RRM)   ·   ADM. LOCAL (RML)", MR, y-2.6, {align:"right"});
  doc.setFont("helvetica","bold"); doc.setFontSize(8.5); doc.setTextColor(31,58,95);
  doc.text(`${esc(rc.ctx.rrmName||"—")}   ›   ${esc(rc.ctx.rmaName||"—")}`, MR, y+1.4, {align:"right"});
  y += 3.2;
  doc.setDrawColor(31,58,95); doc.setLineWidth(.5); doc.line(ML, y, MR, y); y += 5;

  // Card suave com barra de acento; Ponto de atendimento em destaque + grid 2 colunas
  const cardTop = y, cardH = 47;
  doc.setFillColor(246,248,251); doc.roundedRect(ML, cardTop, BW, cardH, 2, 2, "F");
  doc.setFillColor(31,58,95); doc.rect(ML, cardTop, 1.5, cardH, "F");
  doc.setFont("helvetica","normal"); doc.setFontSize(6.5); doc.setTextColor(130,130,130);
  doc.text("PONTO DE ATENDIMENTO", ML+6, cardTop+6.5);
  doc.setFont("helvetica","bold"); doc.setFontSize(14); doc.setTextColor(31,58,95);
  doc.text(esc(rc.ctx.pointName||"—"), ML+6, cardTop+13.5);
  doc.setDrawColor(220,226,234); doc.setLineWidth(.3); doc.line(ML+6, cardTop+17, MR-4, cardTop+17);
  const idCell = (x, gy, label, val) => {
    doc.setFont("helvetica","normal"); doc.setFontSize(6); doc.setTextColor(130,130,130);
    doc.text(label.toUpperCase(), x, gy);
    doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(45,45,45);
    doc.text(String(val), x, gy+4);
  };
  const colLx = ML+6, colRx = ML+100;
  let gy = cardTop+23;
  idCell(colLx, gy, "Mês de referência", rc.monthLabel);            idCell(colRx, gy, "Código do relatório", rc.code);
  gy += 8.5;
  idCell(colLx, gy, "Fechamento até (prazo máx.)", calcDataPrev(rc.month)); idCell(colRx, gy, "Situação", statusStr);
  gy += 8.5;
  idCell(colLx, gy, "Encerramento do checklist", dtEnc);           idCell(colRx, gy, "Revisado por", rc.data.reviewedByName||"—");
  y = cardTop + cardH + 6;

  // ── Itens N/A ─────────────────────────────────────────
  const naSecs = Object.keys(rc.naBySection);
  if (naSecs.length) {
    if (y > 255) { doc.addPage(); y = 16; }
    doc.setFillColor(240,240,240); doc.rect(ML, y-3.5, BW, 8, "F");
    doc.setTextColor(80,80,80); doc.setFont("helvetica","bold"); doc.setFontSize(9);
    doc.text("ITENS NÃO APLICÁVEIS — N/A (apenas numeração)", ML+2, y+1.5);
    y += 8;
    naSecs.forEach(si => {
      const sec = SECS.find(s => s[0] === parseInt(si));
      const t = sec ? `${sec[1]} > ${sec[2].split("—")[0].trim()}` : "Seção "+si;
      const nums = rc.naBySection[si].map(x=>x.num).join(", ");
      doc.setFontSize(8); doc.setFont("helvetica","normal"); doc.setTextColor(80,80,80);
      doc.text(`  ${t}: ${nums}`, ML+3, y); y += 5;
    });
    y += 3;
  }

  // ── Itens Pendentes ────────────────────────────────────
  const pendSecs = Object.keys(rc.pendBySection);
  if (pendSecs.length) {
    if (y > 255) { doc.addPage(); y = 16; }
    doc.setFillColor(192,57,43); doc.rect(ML, y-3.5, BW, 8, "F");
    doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(9);
    doc.text("ITENS PENDENTES", ML+2, y+1.5); y += 10;
    pendSecs.forEach(si => {
      const sec = SECS.find(s => s[0] === parseInt(si));
      const t = sec ? `${sec[1]} — ${sec[2]}` : "Seção "+si;
      if (y > 260) { doc.addPage(); y = 16; }
      doc.setFontSize(9); doc.setFont("helvetica","bold"); doc.setTextColor(31,58,95);
      doc.text(t, ML, y); y += 2;
      const rows = rc.pendBySection[si].map(it => [it.num, it.acao, it.obs || "—"]);
      doc.autoTable({
        startY: y, margin:{left:ML,right:14},
        head:[["#","Ação de Compliance","Observação"]],
        body: rows,
        styles:{ fontSize:8, cellPadding:2 },
        headStyles:{ fillColor:[46,74,122], textColor:255, fontStyle:"bold", fontSize:8 },
        columnStyles:{ 0:{cellWidth:14}, 2:{cellWidth:55} },
        theme:"striped",
      });
      y = doc.lastAutoTable.finalY + 6;
    });
  } else {
    if (y > 260) { doc.addPage(); y = 16; }
    doc.setFillColor(31,122,31); doc.rect(ML, y-3.5, BW, 8, "F");
    doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(9);
    doc.text("✓ NENHUM ITEM PENDENTE — FECHAMENTO PERFEITO", ML+2, y+1.5); y += 12;
  }

  // ── Assinaturas ────────────────────────────────────────
  const neededH = 60;
  if (y + neededH > 270) { doc.addPage(); y = 16; }
  y += 4;
  doc.setFontSize(9); doc.setFont("helvetica","bold"); doc.setTextColor(31,58,95);
  doc.text("ASSINATURAS E CIÊNCIA", ML, y); y += 8;
  const signames = rc.data.signames || [];
  for (let i = 0; i < SIGS.length; i += 2) {
    const x1 = ML, x2 = 112;
    const [c1, n1] = [SIGS[i],    signames[i]||""];
    const [c2, n2] = [SIGS[i+1]||"", signames[i+1]||""];
    doc.setFontSize(7.5); doc.setFont("helvetica","normal"); doc.setTextColor(100,100,100);
    doc.text(c1, x1, y); if (c2) doc.text(c2, x2, y);
    y += 10;
    doc.setDrawColor(60,60,60); doc.setLineWidth(.4);
    doc.line(x1, y, x1+90, y); if (c2) doc.line(x2, y, x2+90, y);
    y += 4;
    doc.setFontSize(8); doc.setFont("helvetica","bold"); doc.setTextColor(31,58,95);
    doc.text(n1 || "(assinatura manual)", x1, y);
    if (c2) doc.text(n2 || "(assinatura manual)", x2, y);
    y += 10;
  }

  // ── Carimbo em todas as páginas ────────────────────────
  const total = doc.internal.getNumberOfPages();
  for (let p = 1; p <= total; p++) {
    doc.setPage(p);
    doc.setDrawColor(180,180,180); doc.setLineWidth(.3);
    doc.line(ML, 284, MR, 284);
    doc.setFontSize(6.5); doc.setFont("helvetica","normal"); doc.setTextColor(150,150,150);
    doc.text(`Sistema v${appVer}`, ML, 288);
    doc.text(rc.stamp, CW/2, 288, {align:"center"});
    doc.text(`Pág. ${p}/${total}`, MR, 288, {align:"right"});
  }

  // ── Anexo IA (se disponível) ──────────────────────────
  if (rc.aiAnalysis && rc.aiAnalysis.items?.length) {
    await addAIAnnexToPDF(doc, rc.aiAnalysis, ML, CW);
    // Recarimbar após adicionar páginas do anexo
    const total2 = doc.internal.getNumberOfPages();
    for (let p = 1; p <= total2; p++) {
      doc.setPage(p);
      doc.setFontSize(6.5); doc.setFont("helvetica","normal"); doc.setTextColor(150,150,150);
      doc.line(ML, 284, MR, 284);
      doc.text(`Sistema v${appVer}`, ML, 288);
      doc.text(rc.stamp, CW/2, 288, {align:"center"});
      doc.text(`Pág. ${p}/${total2}`, MR, 288, {align:"right"});
    }
  }

  const fn = `${rc.code}_v${rc.version}.pdf`;
  try {
    doc.save(fn);
    toast(`PDF gerado: ${fn} ✓`, "ok");
  } catch(e) {
    // Fallback para dispositivos que bloqueiam download direto
    const blob = doc.output("blob");
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = fn; a.target = "_blank";
    document.body.appendChild(a); a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1500);
    toast(`PDF gerado: ${fn} ✓`, "ok");
  }
}

// ── GERAÇÃO DO ARQUIVO .md ─────────────────────────────────
function buildMDContent(rc) {
  const data = rc.data; const ctx = rc.ctx; const f = rc.f;
  const dtEnc = f.dataEnc ? new Date(f.dataEnc+"T12:00").toLocaleDateString("pt-BR") : "—";
  let md = `---\ncodigo: ${rc.code}\nversao: ${rc.version}\nponto: ${ctx.pointName||""}\nrma: ${ctx.rmaName||""}\nrrm: ${ctx.rrmName||""}\nmes: ${rc.month}\npublicado_em: ${data.publishedAt ? new Date(data.publishedAt).toISOString() : "—"}\nrevisado_por: ${data.reviewedByName||"—"}\ngerado_em: ${rc.now.toISOString()}\nimpressao: ${rc.prtCount}\n---\n\n`;
  md += `# Relatório de Fechamento — Checklist Compliance CCB\n\n`;
  md += `**Código:** \`${rc.code}\`  \n**${ordinal(rc.version)} Versão | ${ordinal(rc.prtCount)} ${rc.prtCount===1?"Impressão":"Reimpressão"}**  \nGerado em: ${rc.now.toLocaleString("pt-BR")}\n\n`;
  md += `## Identificação\n| Campo | Valor |\n|---|---|\n`;
  md += `| Mês de referência | ${rc.monthLabel} |\n| Ponto de atendimento | ${ctx.pointName||"—"} |\n`;
  md += `| Administração Local | ${ctx.rmaName||"—"} |\n| Regional | ${ctx.rrmName||"—"} |\n`;
  md += `| Data de encerramento | ${dtEnc} |\n| Data prevista fechamento | ${calcDataPrev(rc.month)} |\n\n`;
  // N/A
  const naSecs = Object.keys(rc.naBySection);
  if (naSecs.length) {
    md += `## Itens Não Aplicáveis (N/A)\n`;
    naSecs.forEach(si => {
      const sec = SECS.find(s=>s[0]===parseInt(si));
      const t = sec ? sec[2] : "Seção "+si;
      md += `- **${t}**: ${rc.naBySection[si].map(x=>x.num).join(", ")}\n`;
    });
    md += "\n";
  }
  // Pendentes
  const pendSecs = Object.keys(rc.pendBySection);
  if (pendSecs.length) {
    md += `## Itens Pendentes\n\n`;
    pendSecs.forEach(si => {
      const sec = SECS.find(s=>s[0]===parseInt(si));
      md += `### ${sec ? sec[2] : "Seção "+si}\n`;
      rc.pendBySection[si].forEach(it => {
        md += `- **${it.num}** — ${it.acao}\n`;
        if (it.obs) md += `  > Obs.: ${it.obs}\n`;
      });
      md += "\n";
    });
  } else {
    md += `## Resultado\n\n✓ **Nenhum item pendente — fechamento perfeito**\n\n`;
  }
  // Assinaturas
  md += `## Assinaturas\n`;
  (data.signames||[]).forEach((n,i) => { if (n) md += `- **${SIGS[i]}**: ${n}\n`; });
  md += "\n";
  // Contribuidores
  const contribs = data.contributors || {};
  const names = Object.keys(contribs).map(uid => data.contributorNames?.[uid] || uid);
  if (names.length) md += `## Contribuidores\n${names.map(n=>`- ${n}`).join("\n")}\n\n`;
  // Dados completos (JSON embutido)
  md += `<!-- DADOS_COMPLETOS_JSON\n${JSON.stringify(data, null, 2)}\n-->\n`;
  return md;
}

function downloadMDFile(rc) {
  const content = buildMDContent(rc);
  const blob = new Blob([content], {type:"text/markdown;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const fn = `${rc.code}_v${rc.version}.md`;
  const a = document.createElement("a");
  a.href = url; a.download = fn; a.target = "_blank";
  document.body.appendChild(a);  // necessário para Firefox e Android
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1500);
  toast(`Arquivo .md baixado: ${fn} ✓`, "ok");
}

async function saveMDToDrive(rc) {
  if (!S.drive?.token) { toast("Drive não conectado","err"); return; }
  const content = buildMDContent(rc);
  const fname = `${rc.code}_v${rc.version}.md`;
  const sysFolder = S.profile?.systemDriveFolder || (window.APP_CONFIG||{}).DRIVE_FOLDER_ID || "";
  const meta = { name: fname, mimeType: "text/markdown" };
  if (sysFolder) meta.parents = [sysFolder];
  try {
    const r = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart", {
      method:"POST",
      headers: { Authorization:"Bearer "+S.drive.token },
      body: (() => {
        const fd = new FormData();
        fd.append("metadata", new Blob([JSON.stringify(meta)],{type:"application/json"}));
        fd.append("file",     new Blob([content], {type:"text/markdown"}));
        return fd;
      })()
    });
    if (r.ok) toast(`Salvo no Drive: ${fname} ✓`,"ok");
    else toast("Erro ao salvar no Drive","err");
  } catch(e) { toast("Erro: "+e.message,"err"); }
}

// ── Upload de .md para regenerar PDF ──────────────────────
function importMDAndPrint() {
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = ".md,.txt";
  inp.onchange = async (ev) => {
    try {
      const text = await ev.target.files[0].text();
      const match = text.match(/<!-- DADOS_COMPLETOS_JSON\n([\s\S]*?)\n-->/);
      if (!match) { toast("Arquivo .md inválido ou sem dados JSON embutidos","err"); return; }
      const data = JSON.parse(match[1]);
      // Extrair código do frontmatter
      const codeMatch = text.match(/^codigo:\s*(.+)$/m);
      const code = codeMatch ? codeMatch[1].trim() : "IMPORT-"+Date.now();
      // Contagem de impressões para reimportação (local, sem /reports/)
      const prtCount = 1;  // reimportação sempre começa em 1
      const now = new Date();
      const vMatch = text.match(/^versao:\s*(\d+)$/m);
      const version = vMatch ? parseInt(vMatch[1]) : 1;
      const stamp = `${code} | ${ordinal(version)} versão — ${ordinal(prtCount)} ${prtCount===1?"Impressão":"Reimpressão"} | ${now.toLocaleString("pt-BR")}`;
      // Reconstituir contexto
      const rrmN = text.match(/^rrm:\s*(.+)$/m)?.[1]?.trim() || "";
      const rmaN = text.match(/^rma:\s*(.+)$/m)?.[1]?.trim() || "";
      const ptN  = text.match(/^ponto:\s*(.+)$/m)?.[1]?.trim() || "";
      const ctx = { rrmName:rrmN, rmaName:rmaN, pointName:ptN, pointCity:ptN };
      const f   = data.fields || {};
      const month = f.mes || "";
      let monthLabel = month;
      try { monthLabel = new Date(month+"-01T12:00").toLocaleDateString("pt-BR",{month:"long",year:"numeric"}); } catch{}
      const rc = { data, ctx, f, items:data.items||{}, month, monthLabel, code, stamp, now, prtCount, version, ...buildNaAndPend(data.items||{}) };
      toast(`Importado: ${code} · ${ordinal(prtCount)} ${prtCount===1?"Impressão":"Reimpressão"}`);
      await generateJsPDF(rc);
    } catch(e) { toast("Erro ao processar arquivo: "+e.message,"err"); }
  };
  inp.click();
}

function buildNaAndPend(items) {
  const naBySection = {}, pendBySection = {};
  ITEMS.forEach(([id,num,mom,acao,secIdx]) => {
    const key = String(id).padStart(3,"0");
    const st = items[key]?.status || "";
    const obs = items[key]?.obs || "";
    if (st==="NA") { if(!naBySection[secIdx])naBySection[secIdx]=[]; naBySection[secIdx].push({id,num,acao}); }
    if (st==="PEND") { if(!pendBySection[secIdx])pendBySection[secIdx]=[]; pendBySection[secIdx].push({id,num,acao,obs}); }
  });
  return { naBySection, pendBySection };
}

// ── Histórico de relatórios ────────────────────────────────
async function loadHistory() {
  const el = document.getElementById("hist-rows");
  const lbl = document.getElementById("hist-load");
  if (!el) return;
  if (lbl) lbl.textContent = "";
  const ctx = S.context;
  if (!ctx) return;
  try {
    const snap = await db.ref("checklists")
      .orderByChild("pointId").equalTo(ctx.pointId).once("value");
    const pubs = [];
    if (snap.exists()) {
      snap.forEach(ch => {
        const v = ch.val();
        if (v.status === "publicado") pubs.push({id: ch.key, ...v});
      });
    }
    pubs.sort((a,b) => (b.publishedAt||0) - (a.publishedAt||0));
    if (!pubs.length) {
      el.innerHTML = '<div style="font-size:12px;color:var(--txt3);padding:6px">Nenhum relatório publicado para este ponto ainda.</div>';
      return;
    }
    el.innerHTML = pubs.map(r => {
      const m = r.fields?.mes || r.month || "—";
      let ml = m; try { ml = new Date(m+"-01T12:00").toLocaleDateString("pt-BR",{month:"long",year:"numeric"}); } catch{}
      const pubAt = r.publishedAt ? new Date(r.publishedAt).toLocaleString("pt-BR") : "—";
      const code  = r.reportCode || "(sem código)";
      const ver   = r.version || 1;
      return `<div class="history-row">
        <div class="history-code">${esc(code)}</div>
        <div class="history-meta">
          <strong>${esc(ml)}</strong> · ${ordinal(ver)} versão<br>
          Publicado: ${esc(pubAt)} por ${esc(r.publishedByName||"—")}
        </div>
        <button class="btn btn-sm" onclick="reprintFromHistory('${r.id}')">🖨 Reimprimir</button>
      </div>`;
    }).join("");
  } catch(e) { if (el) el.innerHTML = `<div style="color:var(--verm);font-size:12px">Erro: ${esc(e.message)}</div>`; }
}

async function reprintFromHistory(checklistId) {
  toast("Carregando relatório…");
  const snap = await db.ref("checklists/"+checklistId).once("value");
  if (!snap.exists()) { toast("Relatório não encontrado","err"); return; }
  const data = snap.val();
  const code = data.reportCode || checklistId;
  // Contador dentro do checklist histórico (sem /reports/)
  const histRef = db.ref("checklists/"+checklistId+"/printCount");
  const cntSnap = await histRef.once("value");
  const prtCount = (cntSnap.val() || 0) + 1;
  await histRef.set(prtCount);
  const version  = data.version || 1;
  const now = new Date();
  const stamp = `${code} | ${ordinal(version)} versão — ${ordinal(prtCount)} ${prtCount===1?"Impressão":"Reimpressão"} | ${now.toLocaleString("pt-BR")}`;
  const f = data.fields || {};
  const month = f.mes || "";
  let monthLabel = month; try { monthLabel = new Date(month+"-01T12:00").toLocaleDateString("pt-BR",{month:"long",year:"numeric"}); } catch{}
  const ctx = S.context || {};
  const rc = { data, ctx, f, items:data.items||{}, month, monthLabel, code, stamp, now, prtCount, version, ...buildNaAndPend(data.items||{}) };
  await generateJsPDF(rc);
  setTimeout(loadHistory, 500);
}

function getAIProxyURL() {
  // Prioridade: Firebase (admin pode mudar) → config.js
  return S.appCfg?.aiProxyUrl || (window.APP_CONFIG||{}).AI_PROXY_URL || "";
}

async function analyzeWithAI(pendingItems) {
  const url = getAIProxyURL();
  if (!url) return null;
  if (!pendingItems.length) return { items:[], observacaoGeral:"Nenhum item pendente." };
  try {
    const payload = {
      items: pendingItems.map(it => ({ num:it.num, acao:it.acao, obs:it.obs||"" })),
      month: S.checklist.data?.fields?.mes || "",
      pointName: S.context?.pointName || "",
    };
    const encoded = btoa(encodeURIComponent(JSON.stringify(payload)));
    const resp = await fetch(`${url}?d=${encoded}`);
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const data = await resp.json();
    if (!data.success) throw new Error(data.error || "Erro desconhecido");
    return data.analysis;
  } catch(e) {
    console.error("Erro IA:", e.message);
    return { items:[], error: e.message };
  }
}

// ── PDF: Adicionar anexo IA ────────────────────────────────
async function addAIAnnexToPDF(doc, aiAnalysis, ML, CW) {
  if (!aiAnalysis || !aiAnalysis.items?.length) return;
  const MR = 196, BW = MR - ML;
  doc.addPage();
  let y = 0;

  // Cabeçalho do anexo
  doc.setFillColor(31,58,95); doc.rect(0, 0, CW, 22, "F");
  doc.setTextColor(255,255,255);
  doc.setFont("helvetica","bold"); doc.setFontSize(11);
  doc.text("ANEXO — ANÁLISE E ORIENTAÇÕES", CW/2, 9, {align:"center"});
  doc.setFont("helvetica","normal"); doc.setFontSize(7.5);
  doc.text("Gerado por Gemini 2.0 Flash com base nos Manuais da Obra da Piedade (CCB)", CW/2, 15, {align:"center"});
  doc.setFontSize(7);
  doc.text("Este anexo é informativo. As determinações normativas prevalecem sobre interpretações da IA.", CW/2, 20, {align:"center"});
  y = 28;

  aiAnalysis.items.forEach(item => {
    if (y > 240) { doc.addPage(); y = 16; }

    // Item header
    doc.setFillColor(236,240,248); doc.rect(ML, y-3.5, BW, 8, "F");
    doc.setTextColor(31,58,95); doc.setFont("helvetica","bold"); doc.setFontSize(9.5);
    doc.text(`Item ${item.itemNum||"?"}`, ML+2, y+1.5); y += 8;

    const rows = [];
    if (item.obrigatoriedade) rows.push(["Obrigatoriedade:", item.obrigatoriedade]);
    if (item.trechoExato)     rows.push(["Norma (trecho exato):", `"${item.trechoExato}"`]);
    if (item.motivo)          rows.push(["Por que é obrigatório:", item.motivo]);
    if (item.comoResolver)    rows.push(["Como resolver:", item.comoResolver]);
    if (item.prazo)           rows.push(["Prazo / Urgência:", item.prazo]);
    if (!rows.length) rows.push(["Análise:", "(sem detalhes retornados pela IA)"]);

    doc.autoTable({
      startY: y, margin:{left:ML+2, right:14},
      body: rows, head:[],
      styles:{fontSize:8, cellPadding:2},
      columnStyles:{
        0:{fontStyle:"bold", cellWidth:48, textColor:[31,58,95]},
        1:{textColor:[30,30,30], fontStyle:"italic"}
      },
      theme:"plain",
    });
    y = doc.lastAutoTable.finalY + 8;
  });

  if (aiAnalysis.observacaoGeral) {
    if (y > 260) { doc.addPage(); y = 16; }
    doc.setTextColor(80,80,80); doc.setFont("helvetica","italic"); doc.setFontSize(8);
    doc.text("Observação geral: " + aiAnalysis.observacaoGeral, ML, y);
  }
}

// ── Atualizar doGenerateReport para suportar IA ────────────
// (sobrepõe a função da Fase 3)
async function doGenerateReport() {
  const sel      = document.querySelector('input[name="rpt-type"]:checked')?.value || "pdf";
  const withAI   = document.getElementById("chk-with-ai")?.checked && !!getAIProxyURL();
  closeModal();

  // Coletar itens pendentes para IA
  let aiAnalysis = null;
  if (withAI) {
    toast("Consultando IA…");
    const pendItems = [];
    const items = S.checklist.data?.items || {};
    ITEMS.forEach(([id,num,mom,acao]) => {
      const key = String(id).padStart(3,"0");
      if ((items[key]?.status||"") === "PEND") {
        pendItems.push({ id, num, acao, obs: items[key]?.obs||"" });
      }
    });
    if (pendItems.length) {
      aiAnalysis = await analyzeWithAI(pendItems);
      if (aiAnalysis?.error) toast("Aviso IA: " + aiAnalysis.error, "err");
      else toast("Análise IA concluída ✓","ok");
    } else {
      toast("Sem itens pendentes — análise IA não necessária");
    }
  }

  toast("Gerando relatório…");
  const code     = await getOrCreateReportCode();
  const prtCount = await getNextPrintCount(code);
  const version  = S.checklist.data?.version || 1;
  const now      = new Date();
  const stamp    = `${code} | ${version>1?ordinal(version)+" versão — ":""}${ordinal(prtCount)} ${prtCount===1?"Impressão":"Reimpressão"} | ${now.toLocaleString("pt-BR")}`;
  const rc       = buildReportContext(code, stamp, now, prtCount, version);
  rc.aiAnalysis  = aiAnalysis;  // injetar na geração PDF

  if (sel === "pdf"   || sel === "both") { await generateJsPDF(rc); }
  if (sel === "md"    || sel === "both") { downloadMDFile(rc); }
  if (sel === "drive") { await saveMDToDrive(rc); }
  setTimeout(loadHistory, 500);
}

      { n:22, texto:"Encerrar a Piedade no SIGA (prazo: até o dia 20). Este ato libera o fechamento contábil da Administração. Confirmar que nenhuma divergência ficou em aberto sem justificativa formal." },
    ]},
];

// ── Helpers de estado do fechamento ────────────────────────────────────────
function fechKey() {
  const ctx = S.context || {};
  const mes = S.fechamento?._mes || new Date().toISOString().slice(0,7);
  return `fechamento/${ctx.rrmId||'rrm'}/${ctx.rmaId||'rma'}/${ctx.pointId||'pt'}/${mes.replace('-','_')}`;
}

async function loadFechamento(mes) {
  const ctx = S.context || {};
  if (!ctx.pointId) { toast("Selecione um ponto de atendimento primeiro.","err"); return; }
  const key = `fechamento/${ctx.rrmId}/${ctx.rmaId}/${ctx.pointId}/${mes.replace('-','_')}`;
  const snap = await db.ref(key).once("value");
  S.fechamento = snap.val() || { _mes: mes, steps:{}, attest:{} };
  S.fechamento._mes = mes;
  S.fechRef = db.ref(key);
}

async function saveFechStep(stepNum, data) {
  if (!S.fechRef) return;
  await S.fechRef.child(`steps/${stepNum}`).update(data);
  if (!S.fechamento.steps) S.fechamento.steps = {};
  S.fechamento.steps[stepNum] = { ...(S.fechamento.steps[stepNum]||{}), ...data };
}

function fechStepData(n) { return S.fechamento?.steps?.[n] || {}; }

function calcDiff(a, b) {
  const na = parseFloat(a?.replace(/[^0-9,.-]/g,'').replace(',','.')) || null;
  const nb = parseFloat(b?.replace(/[^0-9,.-]/g,'').replace(',','.')) || null;
  if (na === null || nb === null) return { val:null, ok:null };
  const diff = Math.abs(na - nb);
  return { val:diff, ok: diff < 0.005 };
}

function fmtBRL(n) {
  if (n === null || isNaN(n)) return "—";
  return n.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
}

// ── Progresso da fase ─────────────────────────────────────────────────────
function faseProg(fase) {
  const total = fase.etapas.length;
  const done  = fase.etapas.filter(e => {
    const d = fechStepData(e.n);
    if (d.status === 'ok' || d.status === 'cav') {
      if (e.conc) {
        const diff = calcDiff(d.valA, d.valB);
        if (!diff.ok && !d.justified) return false;
      }
      return true;
    }
    return false;
  }).length;
  return { done, total };
}

function totalProg() {
  let done=0, total=0;
  FECH_FASES.forEach(f => { const p=faseProg(f); done+=p.done; total+=p.total; });
  return { done, total };
}

// ── Renderização ───────────────────────────────────────────────────────────
function renderFechamento() {
  const mes = S.fechamento?._mes || new Date().toISOString().slice(0,7);
  const prog = totalProg();
  const pct  = total => total ? Math.round(done/total*100) : 0;
  const { done, total } = prog;
  const ctx = S.context || {};

  return `<div style="height:100vh;overflow-y:auto;background:var(--bg)">
  <div class="fech-nav-bar">
    <button class="btn btn-sm" onclick="setScreen('app')">← Voltar ao Checklist</button>
    <span style="font-weight:600;color:#1F3A5F">📊 Fechamento Contábil Mensal</span>
    <span style="font-size:12px;color:#888">${esc(ctx.pointName||'')} · ${esc(ctx.rrmName||'')} · ${esc(ctx.rmaName||'')}</span>
  </div>
  <div class="fech-wrap">

    <!-- Seletor de mês -->
    <div class="fech-month-sel">
      <label style="font-size:13px;font-weight:600">Competência:</label>
      <input type="month" id="fech-mes-input" value="${esc(mes)}" onchange="trocaMesFech(this.value)">
      <button class="btn btn-sm" onclick="trocaMesFech(document.getElementById('fech-mes-input').value)">Carregar</button>
      <span style="font-size:12px;color:#888;margin-left:8px">${done}/${total} etapas concluídas</span>
    </div>

    <!-- Barra de progresso -->
    <div class="fech-progress"><div class="fech-progress-bar" style="width:${total?Math.round(done/total*100):0}%"></div></div>

    <!-- Fases 1-6 -->
    ${FECH_FASES.map(f => renderFase(f)).join('')}

    <!-- Fase 7 — Atestado -->
    ${renderFase7()}

  </div></div>`;
}

function renderFase(fase) {
  const {done, total} = faseProg(fase);
  const all = done === total;
  const badge = all
    ? `<span class="fech-phase-badge done">${done}/${total} ✓</span>`
    : `<span class="fech-phase-badge ${done>0?'partial':'pending'}">${done}/${total}</span>`;
  const open = FECH_FASES.indexOf(fase) < 2; // fases 1 e 2 abertas por padrão

  return `<div class="fech-phase">
    <div class="fech-phase-hdr" onclick="toggleFase(${fase.n})">
      <span class="fech-phase-num">FASE ${fase.n}</span>
      <span class="fech-phase-title">${esc(fase.titulo)}</span>
      ${badge}
      <span class="fech-phase-chevron${open?' open':''}" id="chev-${fase.n}">▶</span>
    </div>
    <div class="fech-steps${open?' open':''}" id="fase-steps-${fase.n}">
      ${fase.etapas.map(e => renderEtapa(e)).join('')}
    </div>
  </div>`;
}

function toggleFase(n) {
  const steps = document.getElementById(`fase-steps-${n}`);
  const chev  = document.getElementById(`chev-${n}`);
  if (!steps) return;
  const isOpen = steps.classList.contains('open');
  steps.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
}

function renderEtapa(e) {
  const d = fechStepData(e.n);
  const statusOk  = d.status === 'ok';
  const statusCav = d.status === 'cav';
  const isSigilo  = e.sigilo && !isPrivileged();

  if (isSigilo) return `<div class="fech-step" style="background:#fff8e1">
    <div class="fech-step-check"></div>
    <div class="fech-step-num" style="color:#BF360C">${e.n}</div>
    <div class="fech-step-body" style="padding:12px 12px 12px 6px">
      <div class="fech-step-sigilo">🔒 Etapa sigilosa — acesso restrito a diáconos</div>
    </div><div class="fech-step-meta"></div></div>`;

  // Bloco de conciliação
  let concBlock = '';
  if (e.conc) {
    const diff = calcDiff(d.valA, d.valB);
    const diffLabel = diff.val === null ? `<span class="fech-diff na">preencher</span>`
      : diff.ok ? `<span class="fech-diff ok">✓ R$ 0,00</span>`
      : `<span class="fech-diff err">⚠ R$ ${fmtBRL(diff.val)}</span>`;

    const needJust = diff.val !== null && !diff.ok;
    concBlock = `<div class="fech-conc-block">
      <div style="font-size:11px;color:#1F3A5F;font-weight:700;margin-bottom:8px">📐 CONCILIAÇÃO — ${esc(e.conc.meta)}</div>
      <div class="fech-conc-row">
        <label>${esc(e.conc.labelA)}</label>
        <input type="text" id="valA-${e.n}" placeholder="0,00" value="${esc(d.valA||'')}"
          oninput="updateConc(${e.n})" inputmode="decimal">
        <label style="margin-left:8px">${esc(e.conc.labelB)}</label>
        <input type="text" id="valB-${e.n}" placeholder="0,00" value="${esc(d.valB||'')}"
          oninput="updateConc(${e.n})" inputmode="decimal">
        <span id="diff-${e.n}">${diffLabel}</span>
      </div>
      ${needJust ? `<div style="font-size:11px;color:#721c24;margin-bottom:4px">⚠ Diferença detectada — justificativa obrigatória para concluir:</div>
        <textarea class="fech-just" id="just-${e.n}" placeholder="Descreva a causa e o tratamento aplicado..."
          oninput="autoSaveFech(${e.n})">${esc(d.justification||'')}</textarea>` : ''}
    </div>`;
  }

  const bgStep = statusOk ? '#f8fff8' : statusCav ? '#fffef0' : '#fff';

  return `<div class="fech-step" id="step-row-${e.n}" style="background:${bgStep}">
    <div class="fech-step-check">
      <input type="checkbox" id="chk-${e.n}" ${statusOk||statusCav?'checked':''} onchange="toggleStepStatus(${e.n},this.checked)">
    </div>
    <div class="fech-step-num">${e.n}</div>
    <div class="fech-step-body">
      ${e.sigilo ? `<div class="fech-step-sigilo">🔒 SIGILOSO — somente diáconos</div>` : ''}
      <div class="fech-step-text">${esc(e.texto)}</div>
      ${concBlock}
      ${statusOk||statusCav ? `<textarea class="fech-obs-area" id="obs-${e.n}" placeholder="Observações (opcional)..."
        oninput="autoSaveFech(${e.n})">${esc(d.obs||'')}</textarea>` : ''}
    </div>
    <div class="fech-step-meta">
      <div class="fech-meta-fields">
        <label style="font-size:11px;color:#888">Data conclusão</label>
        <input type="date" id="date-${e.n}" value="${esc(d.date||'')}" oninput="autoSaveFech(${e.n})">
        <label style="font-size:11px;color:#888;margin-top:4px">Responsável</label>
        <input type="text" id="resp-${e.n}" placeholder="Nome" value="${esc(d.resp||'')}" oninput="autoSaveFech(${e.n})">
        <div class="fech-step-status" style="margin-top:6px">
          <button class="fech-status-btn ${statusOk?'active-ok':''}" onclick="setStepStatus(${e.n},'ok')">✓ OK</button>
          <button class="fech-status-btn ${statusCav?'active-cav':''}" onclick="setStepStatus(${e.n},'cav')">⚠ Ressalva</button>
        </div>
      </div>
    </div>
  </div>`;
}

function renderFase7() {
  const at = S.fechamento?.attest || {};
  const prog = totalProg();
  const allDone = prog.done === prog.total;
  return `<div class="fech-phase7">
    <h3>⑦ FASE 7 — Atestado de Conformidade${allDone ? ' ✓' : ''}</h3>
    ${!allDone ? `<div class="fech-note">Conclua todas as 22 etapas para habilitar o atestado.</div>` : ''}
    <label class="fech-attest-check ${!allDone?'':''}" style="opacity:${allDone?1:.45}">
      <input type="checkbox" id="attest-int" ${at.internal?'checked':''} ${allDone?'':'disabled'}
        onchange="saveAttest()">
      Coerência interna: todos os confrontos SIGA × SIGA fecharam com diferença = R$ 0,00 em todos os níveis.
    </label>
    <label class="fech-attest-check" style="opacity:${allDone?1:.45}">
      <input type="checkbox" id="attest-ext" ${at.external?'checked':''} ${allDone?'':'disabled'}
        onchange="saveAttest()">
      Ancoragem externa: caixa, banco, estoque e documentos fiscais validados com fontes reais.
    </label>
    <label class="fech-attest-check" style="opacity:${allDone?1:.45}">
      <input type="checkbox" id="attest-div" ${at.divergences?'checked':''} ${allDone?'':'disabled'}
        onchange="saveAttest()">
      Toda divergência encontrada foi documentada com causa identificada e tratamento aplicado.
    </label>
    <div class="fech-sign-block" style="opacity:${allDone?1:.45}">
      <div><label>Assinatura / Nome</label>
        <input type="text" id="attest-sign" value="${esc(at.signature||S.profile?.name||'')}" ${allDone?'':'disabled'} oninput="saveAttest()"></div>
      <div><label>Data de atestado</label>
        <input type="date" id="attest-date" value="${esc(at.date||'')}" ${allDone?'':'disabled'} oninput="saveAttest()"></div>
    </div>
  </div>`;
}

// ── Interações ─────────────────────────────────────────────────────────────
async function trocaMesFech(mes) {
  if (!mes) return;
  await loadFechamento(mes);
  setScreen("fechamento");
}

function updateConc(n) {
  const a = document.getElementById(`valA-${n}`)?.value || '';
  const b = document.getElementById(`valB-${n}`)?.value || '';
  const diff = calcDiff(a, b);
  const el = document.getElementById(`diff-${n}`);
  if (el) el.innerHTML = diff.val === null
    ? `<span class="fech-diff na">preencher</span>`
    : diff.ok ? `<span class="fech-diff ok">✓ R$ 0,00</span>`
    : `<span class="fech-diff err">⚠ R$ ${fmtBRL(diff.val)}</span>`;
  autoSaveFech(n);
}

let _fechSaveTimer = {};
function autoSaveFech(n) {
  clearTimeout(_fechSaveTimer[n]);
  _fechSaveTimer[n] = setTimeout(() => persistFechStep(n), 800);
}

async function persistFechStep(n) {
  const data = { updatedAt: Date.now() };
  if (document.getElementById(`valA-${n}`)) data.valA = document.getElementById(`valA-${n}`).value;
  if (document.getElementById(`valB-${n}`)) data.valB = document.getElementById(`valB-${n}`).value;
  if (document.getElementById(`just-${n}`)) data.justification = document.getElementById(`just-${n}`).value;
  if (document.getElementById(`obs-${n}`)) data.obs = document.getElementById(`obs-${n}`).value;
  if (document.getElementById(`date-${n}`)) data.date = document.getElementById(`date-${n}`).value;
  if (document.getElementById(`resp-${n}`)) data.resp = document.getElementById(`resp-${n}`).value;
  await saveFechStep(n, data);
}

function canCompleteStep(n) {
  const fase = FECH_FASES.find(f => f.etapas.some(e => e.n === n));
  const etapa = FECH_FASES.flatMap(f=>f.etapas).find(e=>e.n===n);
  if (!etapa?.conc) return true;
  const a = document.getElementById(`valA-${n}`)?.value || '';
  const b = document.getElementById(`valB-${n}`)?.value || '';
  const diff = calcDiff(a, b);
  if (diff.ok || diff.val === null) return true;
  const just = document.getElementById(`just-${n}`)?.value?.trim() || '';
  return just.length >= 10;
}

async function toggleStepStatus(n, checked) {
  if (checked && !canCompleteStep(n)) {
    toast("Preencha os campos de conciliação e, se houver diferença, forneça a justificativa (mín. 10 caracteres).","err");
    document.getElementById(`chk-${n}`).checked = false;
    return;
  }
  const status = checked ? 'ok' : 'pending';
  await saveFechStep(n, { status, updatedAt: Date.now() });
  await persistFechStep(n);
  refreshFechRow(n, status);
  refreshFaseHeaders();
  refreshFase7();
}

async function setStepStatus(n, st) {
  if (st !== 'pending' && !canCompleteStep(n)) {
    toast("Preencha os campos de conciliação (e justifique divergências antes de concluir).","err");
    return;
  }
  await saveFechStep(n, { status: st, updatedAt: Date.now() });
  await persistFechStep(n);
  refreshFechRow(n, st);
  refreshFaseHeaders();
  refreshFase7();
}

function refreshFechRow(n, status) {
  const row = document.getElementById(`step-row-${n}`);
  if (!row) return;
  if (!S.fechamento.steps) S.fechamento.steps = {};
  S.fechamento.steps[n] = { ...(S.fechamento.steps[n]||{}), status };
  row.style.background = status==='ok' ? '#f8fff8' : status==='cav' ? '#fffef0' : '#fff';
  const chk = document.getElementById(`chk-${n}`);
  if (chk) chk.checked = (status==='ok'||status==='cav');
}

function refreshFaseHeaders() {
  FECH_FASES.forEach(f => {
    const {done, total} = faseProg(f);
    const all = done === total;
    const badge = document.querySelector(`#chev-${f.n}`)?.parentElement?.querySelector('.fech-phase-badge');
    if (!badge) return;
    badge.textContent = `${done}/${total}${all?' ✓':''}`;
    badge.className = `fech-phase-badge ${all?'done':done>0?'partial':'pending'}`;
  });
  const {done,total} = totalProg();
  const bar = document.querySelector('.fech-progress-bar');
  if (bar) bar.style.width = `${total?Math.round(done/total*100):0}%`;
  const cnt = document.querySelector('.fech-month-sel span');
  if (cnt) cnt.textContent = `${done}/${total} etapas concluídas`;
}

function refreshFase7() {
  const ph7 = document.querySelector('.fech-phase7');
  if (!ph7) return;
  ph7.outerHTML = renderFase7();
}

async function saveAttest() {
  if (!S.fechRef) return;
  const attest = {
    internal: !!document.getElementById('attest-int')?.checked,
    external: !!document.getElementById('attest-ext')?.checked,
    divergences: !!document.getElementById('attest-div')?.checked,
    signature: document.getElementById('attest-sign')?.value || '',
    date: document.getElementById('attest-date')?.value || '',
    savedAt: Date.now(),
  };
  await S.fechRef.child('attest').update(attest);
  S.fechamento.attest = attest;
  toast("Atestado salvo ✓","ok");
}

// Hook: ao entrar na tela fechamento, carregar dados do mês atual
const _origSetScreen = setScreen;
// (não precisa sobrescrever setScreen — carregamos ao clicar no botão)
// Interceptar clique no botão de fechamento via onclick inline acima

// Carregar fechamento ao navegar para a tela
async function goToFechamento() {
  const mes = new Date().toISOString().slice(0,7);
  try {
    await loadFechamento(mes);
  } catch (e) {
    // ARQ-04: nunca "clica e nada acontece" — mostrar erro específico
    const denied = e?.code === "PERMISSION_DENIED" || /permission|denied/i.test(e?.message || "");
    toast(denied
      ? "Não foi possível abrir o Fechamento: acesso negado pelo banco. Falta a regra /fechamento nas Security Rules do Firebase (veja FIREBASE_SETUP.md)."
      : "Não foi possível abrir o Fechamento: " + (e?.message || "erro desconhecido"), "err");
    return;
  }
  setScreen("fechamento");
}

document.addEventListener("DOMContentLoaded", () => { initApp(); checkOrientation(); });
