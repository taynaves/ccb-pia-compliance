<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CCB PIA Compliance</title>
<style>
/* ═══════════════════════════════════════════════════════════
   VARIÁVEIS E RESET
═══════════════════════════════════════════════════════════ */
:root{
  --azul:#1F3A5F; --azul2:#2E75B6; --azul3:#3a5f8a;
  --verde:#1F7A1F; --verde2:#2d9e2d;
  --verm:#C0392B;  --larj:#D67D00; --cinza:#7F8C8D;
  --bg:#F0F3F8;    --card:#ffffff; --brd:#dde2ea;
  --txt:#1a1a2e;   --txt2:#556070; --txt3:#8899aa;
  --ok-bg:#E8F5E9; --pend-bg:#FDECEA; --na-bg:#F5F5F5;
  --shadow:0 2px 12px rgba(31,58,95,.12);
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Calibri,Segoe UI,Arial,sans-serif;font-size:14px;
     color:var(--txt);background:var(--bg);min-height:100vh}
a{color:var(--azul2);text-decoration:none}
button{font-family:inherit;cursor:pointer}

/* ═══ TOPBAR ═══════════════════════════════════════════════ */
.topbar{
  position:sticky;top:0;z-index:200;
  background:var(--azul);color:#fff;
  display:flex;align-items:center;
  padding:0 16px;height:54px;gap:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.25);
}
.topbar-icon{height:32px;width:auto;flex-shrink:0;border-radius:4px}
.topbar-title{font-size:15px;font-weight:600;white-space:nowrap}
.topbar-ctx{font-size:11px;opacity:.75;white-space:nowrap;
            overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap}
/* ═══════ CAMADA 2 — FECHAMENTO CONTÁBIL MENSAL ═══════ */
.fech-wrap{max-width:980px;margin:0 auto;padding:16px}
.fech-header{background:#1F3A5F;color:#fff;border-radius:10px;padding:18px 24px;margin-bottom:20px}
.fech-header h2{margin:0 0 4px;font-size:18px}
.fech-header .fech-meta{font-size:13px;opacity:.8}
.fech-month-sel{display:flex;gap:10px;align-items:center;margin-bottom:18px}
.fech-month-sel input{padding:7px 12px;border:1px solid var(--brd);border-radius:6px;font-size:14px}
.fech-phase{border:1px solid var(--brd);border-radius:8px;margin-bottom:14px;overflow:hidden}
.fech-phase-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;background:var(--bg2);border-bottom:1px solid var(--brd)}
.fech-phase-hdr:hover{background:#e8eef5}
.fech-phase-num{background:#1F3A5F;color:#fff;border-radius:6px;padding:3px 10px;font-size:13px;font-weight:700;white-space:nowrap}
.fech-phase-title{font-weight:600;color:#1F3A5F;flex:1;font-size:14px}
.fech-phase-badge{font-size:12px;border-radius:12px;padding:2px 10px;font-weight:600}
.fech-phase-badge.done{background:#d4edda;color:#155724}
.fech-phase-badge.partial{background:#fff3cd;color:#856404}
.fech-phase-badge.pending{background:#f0f0f0;color:#666}
.fech-phase-chevron{color:#888;font-size:14px;transition:transform .2s}
.fech-phase-chevron.open{transform:rotate(90deg)}
.fech-steps{display:none;padding:0 0 8px}
.fech-steps.open{display:block}
.fech-step{display:grid;grid-template-columns:36px 36px 1fr auto;gap:0;border-bottom:1px solid #f0f0f0;align-items:start}
.fech-step:last-child{border-bottom:none}
.fech-step-check{display:flex;align-items:center;justify-content:center;padding:14px 0 14px 12px}
.fech-step-check input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:#1F3A5F}
.fech-step-num{display:flex;align-items:center;justify-content:center;padding:14px 4px;font-size:12px;font-weight:700;color:#1F3A5F}
.fech-step-body{padding:12px 12px 12px 6px}
.fech-step-text{font-size:13px;color:#333;margin-bottom:8px;line-height:1.5}
.fech-step-sigilo{font-size:11px;color:#BF360C;font-weight:600;margin-bottom:6px}
.fech-conc-block{background:#f8faff;border:1px solid #d4e3f2;border-radius:6px;padding:10px 12px;margin-top:8px}
.fech-conc-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.fech-conc-row label{font-size:12px;color:#555;min-width:140px;font-weight:600}
.fech-conc-row input[type=text]{width:140px;padding:5px 8px;border:1px solid #ccc;border-radius:5px;font-size:13px;font-family:monospace}
.fech-diff{font-size:12px;font-weight:700;padding:4px 10px;border-radius:5px;margin-left:4px}
.fech-diff.ok{background:#d4edda;color:#155724}
.fech-diff.err{background:#f8d7da;color:#721c24}
.fech-diff.na{background:#f0f0f0;color:#888}
.fech-just{width:100%;padding:5px 8px;border:1px solid #ccc;border-radius:5px;font-size:12px;margin-top:6px;resize:vertical}
.fech-step-meta{padding:10px 14px 10px 0;min-width:170px}
.fech-meta-fields{display:flex;flex-direction:column;gap:5px}
.fech-meta-fields input{padding:4px 8px;border:1px solid #ddd;border-radius:4px;font-size:12px;width:155px}
.fech-step-status{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.fech-status-btn{font-size:11px;padding:3px 8px;border:1px solid #ccc;border-radius:4px;cursor:pointer;background:#fff}
.fech-status-btn.active-ok{background:#d4edda;border-color:#28a745;color:#155724;font-weight:700}
.fech-status-btn.active-cav{background:#fff3cd;border-color:#ffc107;color:#856404;font-weight:700}
.fech-obs-area{width:100%;padding:5px 8px;border:1px solid #ddd;border-radius:4px;font-size:12px;margin-top:6px;resize:vertical;min-height:40px}
.fech-phase7{border:2px solid #1B5E20;border-radius:10px;background:#E8F5E9;padding:20px 24px;margin-top:8px}
.fech-phase7 h3{color:#1B5E20;margin:0 0 14px;font-size:16px}
.fech-attest-check{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:14px;color:#1B5E20}
.fech-attest-check input{width:18px;height:18px;accent-color:#1B5E20}
.fech-sign-block{margin-top:16px;padding-top:16px;border-top:1px solid #a5d6a7;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fech-sign-block input{padding:7px 10px;border:1px solid #a5d6a7;border-radius:6px;font-size:13px;background:#fff;width:100%}
.fech-sign-block label{font-size:12px;color:#2e7d32;font-weight:600;margin-bottom:3px;display:block}
.fech-actions{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.fech-progress{height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden;margin-bottom:16px}
.fech-progress-bar{height:100%;background:#1F3A5F;border-radius:3px;transition:width .4s}
.fech-nav-bar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:#f5f7fa;border-bottom:1px solid var(--brd)}
.fech-note{background:#fff8e1;border-left:4px solid #f59e0b;border-radius:4px;padding:10px 14px;font-size:12px;color:#555;margin:8px 12px}
/* ═══════════════════════════════════════════════════════ */
.tb-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
        color:#fff;padding:4px 10px;border-radius:5px;font-size:12px;
        transition:background .12s;white-space:nowrap}
.tb-btn:hover{background:rgba(255,255,255,.22)}
.tb-btn-danger{border-color:rgba(255,100,100,.4)}
.tb-btn-danger:hover{background:rgba(255,60,60,.2)}
/* Ícone de perfil (👤): recolore o emoji para branco suave, dando contraste
   sobre a barra azul sem ficar mais chamativo que os demais botões da região */
.prof-ico{filter:brightness(0) invert(1);opacity:.9;display:inline-block}

/* ═══ PRESENCE (quem está online) ════════════════════════ */
.presence-wrap{display:flex;align-items:center;gap:4px}
.presence-avatar{
  width:26px;height:26px;border-radius:50%;
  background:var(--azul2);border:2px solid rgba(255,255,255,.5);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:#fff;cursor:default;
  position:relative;flex-shrink:0;
}
.presence-avatar[title]:hover::after{
  content:attr(title);position:absolute;bottom:-26px;left:50%;
  transform:translateX(-50%);background:#333;color:#fff;
  font-size:10px;padding:2px 6px;border-radius:4px;white-space:nowrap;
  pointer-events:none;z-index:300;
}
.presence-dot{width:7px;height:7px;border-radius:50%;
              background:#4CAF50;position:absolute;bottom:0;right:0}

/* ═══ TELA DE LOGIN ════════════════════════════════════════ */
.login-page{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg, #1a2f50 0%, #2a4a7a 60%, #1F3A5F 100%);
  padding:20px;
}
.login-card{
  background:#fff;border-radius:16px;padding:36px 32px 28px;
  width:100%;max-width:420px;text-align:center;
  box-shadow:0 8px 40px rgba(0,0,0,.3);
}
.login-img{max-width:100%;object-fit:contain;margin-bottom:20px;
           display:block;margin-left:auto;margin-right:auto}
.login-title{font-size:22px;font-weight:700;color:var(--azul);margin-bottom:4px}
.login-sub{font-size:12px;color:var(--txt2);margin-bottom:24px}
.google-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:12px 16px;border-radius:8px;font-size:15px;font-weight:600;
  background:var(--azul);color:#fff;border:none;
  transition:background .12s, transform .08s;
}
.google-btn:hover{background:var(--azul3)}
.google-btn:active{transform:scale(.98)}
.google-btn svg{flex-shrink:0}
.login-footer{margin-top:20px;font-size:10px;color:#aaa}
.login-err{background:#fdecea;color:#922;border:1px solid #f5c1c1;
           border-radius:6px;padding:8px 12px;font-size:12px;
           margin-bottom:14px;text-align:left}

/* ═══ TELAS INTERMEDIÁRIAS ════════════════════════════════ */
.mid-page{min-height:100vh;display:flex;flex-direction:column;
          align-items:center;justify-content:center;padding:20px;
          background:var(--bg)}
.mid-card{background:var(--card);border:1px solid var(--brd);
          border-radius:var(--radius);padding:32px;
          width:100%;max-width:560px;box-shadow:var(--shadow)}
.mid-icon{font-size:40px;margin-bottom:16px}
.mid-title{font-size:20px;font-weight:700;color:var(--azul);margin-bottom:8px}
.mid-sub{font-size:13px;color:var(--txt2);margin-bottom:24px;line-height:1.5}
.mid-sep{border:none;border-top:1px solid var(--brd);margin:20px 0}

/* ═══ FORMULÁRIOS ══════════════════════════════════════════ */
.form-group{margin-bottom:14px}
.lbl{display:block;font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:4px}
.lbl-req::after{content:" *";color:var(--verm)}
input[type=text],input[type=email],select,textarea{
  width:100%;padding:8px 10px;border:1px solid var(--brd);border-radius:6px;
  font-size:13px;font-family:inherit;background:var(--card);color:var(--txt);
  transition:border-color .12s;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--azul2)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hint{font-size:11px;color:var(--txt3);margin-top:3px}
.loc-item{
  border:1px solid var(--brd);border-radius:8px;padding:12px;
  margin-bottom:8px;background:#f8fafd;
}
.loc-remove{float:right;color:var(--verm);background:none;border:none;
            font-size:16px;cursor:pointer;opacity:.6}
.loc-remove:hover{opacity:1}
.chk-tag{
  display:inline-flex;align-items:center;gap:5px;
  background:#e8f0fa;border:1px solid #c0d0e8;
  border-radius:6px;padding:3px 8px;margin:3px;font-size:12px;cursor:pointer;
}
.chk-tag input{cursor:pointer}
.chk-tag.selected{background:var(--azul);color:#fff;border-color:var(--azul)}

/* ═══ BOTÕES ═══════════════════════════════════════════════ */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;
     border-radius:6px;border:1px solid var(--brd);background:var(--card);
     font-size:13px;font-family:inherit;color:var(--txt);transition:background .1s}
.btn:hover{background:#eef2f7;border-color:#aab}
.btn-primary{background:var(--azul);color:#fff;border-color:var(--azul)}
.btn-primary:hover{background:#2c4f7a}
.btn-success{background:var(--verde);color:#fff;border-color:var(--verde)}
.btn-success:hover{background:var(--verde2)}
.btn-danger{border-color:var(--verm);color:var(--verm)}
.btn-danger:hover{background:var(--pend-bg)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-xs{padding:2px 7px;font-size:11px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}

/* ═══ CHECKLIST — LAYOUT PRINCIPAL ════════════════════════ */
.app-page{min-height:100vh;display:flex;flex-direction:column}
.app-body{flex:1;padding:14px;max-width:980px;margin:0 auto;width:100%}
.ident-card{
  background:var(--card);border:1px solid var(--brd);
  border-radius:var(--radius);padding:14px 18px;margin-bottom:14px;
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
}
.ident-fld label{font-size:11px;font-weight:600;color:var(--txt2);display:block;margin-bottom:2px}
.ident-fld input[type=month],.ident-fld input[type=date],.ident-fld input[type=text],.ident-fld select{
  font-size:12px;padding:5px 8px}
/* Combobox de localidade com filtro digitável (R2) */
.loc-combo{position:relative}
.loc-combo-list{position:absolute;top:100%;left:0;right:0;z-index:60;background:var(--card);
  border:1px solid var(--brd);border-radius:6px;margin-top:2px;max-height:240px;overflow-y:auto;
  box-shadow:0 6px 18px rgba(0,0,0,.18)}
.loc-combo-item{padding:6px 10px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--brd);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.loc-combo-item:last-child{border-bottom:none}
.loc-combo-item:hover,.loc-combo-item.hi{background:var(--azul);color:#fff}
.loc-combo-item.cur{font-weight:700;color:var(--azul)}
.loc-combo-item.cur::after{content:" ✓"}
.loc-combo-item.cur:hover,.loc-combo-item.cur.hi{color:#fff}
.loc-combo-empty{padding:8px 10px;font-size:12px;color:var(--txt3)}

/* ═══ CHECKLIST — SEÇÃO ════════════════════════════════════ */
.part-banner{
  background:var(--azul);color:#fff;padding:9px 14px;
  border-radius:8px;margin:16px 0 4px;font-size:14px;font-weight:600;
}
.part-banner-sub{display:block;font-size:10px;font-weight:400;opacity:.75;margin-top:2px}

.sec-wrap{margin-bottom:8px;border-radius:var(--radius);overflow:hidden;
          box-shadow:0 1px 6px rgba(31,58,95,.08);
          border:1px solid var(--brd);transition:border-color .2s}
/* Cores de status da seção */
.sec-wrap.st-neutro {}
.sec-wrap.st-andamento{border-color:#2E75B6}
.sec-wrap.st-realizado{border-color:var(--verde)}
.sec-wrap.st-ressalvas{border-color:#27ae60}
.sec-wrap.st-pendente{border-color:var(--verm)}
.sec-wrap.st-na{border-color:var(--cinza)}

.sec-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 12px;gap:8px;transition:background .2s;
}
.sec-wrap.st-neutro .sec-hdr{background:#2E4A7A;color:#fff}
.sec-wrap.st-andamento .sec-hdr{background:#2E75B6;color:#fff}
.sec-wrap.st-realizado .sec-hdr{background:var(--verde);color:#fff}
.sec-wrap.st-ressalvas .sec-hdr{background:#27ae60;color:#fff}
.sec-wrap.st-pendente .sec-hdr{background:var(--verm);color:#fff}
.sec-wrap.st-na .sec-hdr{background:#95a5a6;color:#fff}

.sec-hdr-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.sec-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sec-status-badge{
  font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;
  background:rgba(255,255,255,.2);color:#fff;white-space:nowrap;flex-shrink:0;
}
.sec-hdr-right{display:flex;align-items:center;gap:4px;flex-shrink:0}

/* ═══ CHECKLIST — TABELA ════════════════════════════════════ */
.tbl{width:100%;border-collapse:collapse}
.tbl th{background:#2E4A7A;color:#fff;font-size:11px;font-weight:600;
        padding:5px 8px;text-align:left}
.tbl th.c-status,.tbl td.c-status{text-align:center;width:115px}
.tbl th.c-obs,.tbl td.c-obs{width:100px}
.tbl th.c-mom,.tbl td.c-mom{width:72px;text-align:center}
.tbl th.c-num,.tbl td.c-num{width:42px;text-align:center;
  font-weight:700;color:var(--azul)}
.tbl td{padding:5px 8px;border-bottom:1px solid #f0f2f5;vertical-align:top}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:nth-child(even) td{background:rgba(46,116,182,.03)}
.acao{font-size:12px;line-height:1.4}
.alt-by{font-size:10px;color:var(--larj);font-style:italic;margin-top:2px}
.badge{display:inline-block;font-size:9px;font-weight:600;padding:2px 5px;
       border-radius:10px;color:#fff;line-height:1.3;white-space:nowrap}

/* ═══ RADIO BUTTONS ════════════════════════════════════════ */
.rb-group{display:flex;flex-direction:column;gap:1px}
.rb-lbl{
  display:flex;align-items:center;gap:5px;cursor:pointer;
  padding:3px 6px;border-radius:4px;border:1px solid transparent;
  font-size:11px;transition:background .08s,border-color .08s;user-select:none;
  -webkit-user-select:none;width:100%;box-sizing:border-box;
}
.rb-lbl:hover{background:#e0eaf7;border-color:var(--azul2)!important}
.rb-lbl input[type=radio]{
  /* pointer-events:none evita duplo disparo: o clique é capturado só pelo label */
  pointer-events:none;
  width:14px;height:14px;flex-shrink:0;
  accent-color:var(--azul);
}
.rb-lbl.ok{background:var(--ok-bg);border-color:var(--verde)}
.rb-lbl.pend{background:var(--pend-bg);border-color:var(--verm)}
.rb-lbl.na{background:var(--na-bg);border-color:var(--cinza)}
.sym-ok{color:var(--verde);font-weight:700;font-size:13px}
.sym-pend{color:var(--verm);font-weight:700;font-size:13px}
.sym-na{color:var(--cinza);font-weight:700;font-size:13px}

.obs-ta{
  width:100%;border:1px solid var(--brd);border-radius:4px;
  padding:3px 5px;font-size:11px;font-family:inherit;
  resize:none;min-height:50px;background:transparent;
  color:var(--txt);transition:border-color .12s;
}
.obs-ta:focus{outline:none;border-color:var(--azul2)}

/* ═══ SUMÁRIO ══════════════════════════════════════════════ */
.summ-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;
           padding:14px;background:var(--card);
           border:1px solid var(--brd);border-radius:var(--radius);
           margin-bottom:12px}
.summ-c{background:var(--bg);border-radius:8px;padding:10px;text-align:center}
.summ-n{font-size:24px;font-weight:700}
.summ-l{font-size:10px;color:var(--txt2);margin-top:3px}

/* ═══ ASSINATURAS ══════════════════════════════════════════ */
.sig-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px}
.sig-box{border:1px solid var(--brd);border-radius:8px;padding:12px;text-align:center}
.sig-line{border-bottom:1px solid #444;margin:26px 8px 5px}
.sig-lbl{font-size:10px;color:var(--txt2)}
.sig-name-inp{width:100%;border:none;border-bottom:1px solid var(--brd);
              background:transparent;text-align:center;font-size:12px;
              padding:2px;font-family:inherit;color:var(--txt)}
.sig-name-inp:focus{outline:none;border-bottom-color:var(--azul2)}

/* ═══ ADMIN PANEL ══════════════════════════════════════════ */
.admin-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;
  display:flex;justify-content:flex-end;
}
.admin-panel{
  width:min(600px,100vw);height:100vh;overflow-y:auto;
  background:var(--card);box-shadow:-4px 0 24px rgba(0,0,0,.2);
  display:flex;flex-direction:column;
}
.admin-topbar{
  background:var(--azul);color:#fff;padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:10;
}
.admin-body{padding:16px;flex:1}
.admin-section{margin-bottom:20px}
.admin-section-title{
  font-size:13px;font-weight:700;color:var(--azul);
  border-bottom:2px solid var(--azul2);padding-bottom:5px;margin-bottom:12px;
}
.user-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:6px;background:var(--bg);margin-bottom:4px;
}
.user-avatar{width:34px;height:34px;border-radius:50%;background:var(--azul2);
             flex-shrink:0;object-fit:cover;display:flex;align-items:center;
             justify-content:center;color:#fff;font-weight:700;font-size:13px}
.user-info{flex:1;min-width:0}
.user-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-email{font-size:11px;color:var(--txt2)}
.tag-pending{display:inline-block;background:#fff3cd;color:#856404;
             font-size:10px;padding:1px 6px;border-radius:4px;border:1px solid #ffc107}
.tag-super{display:inline-block;background:#d4edda;color:#155724;
           font-size:10px;padding:1px 6px;border-radius:4px;border:1px solid #28a745}
.tag-admin{display:inline-block;background:#cce5ff;color:#004085;
           font-size:10px;padding:1px 6px;border-radius:4px;border:1px solid #4a90d9}
.loc-tree{border:1px solid var(--brd);border-radius:8px;overflow:hidden;margin-bottom:8px}
.loc-tree-hdr{background:#eef2f7;padding:8px 12px;font-size:12px;font-weight:600;
              color:var(--azul);display:flex;align-items:center;justify-content:space-between}
.loc-tree-body{padding:6px 12px}
.loc-leaf{font-size:12px;padding:3px 0;color:var(--txt2);display:flex;
          align-items:center;justify-content:space-between;gap:6px}
.add-loc-form{background:#f8fafd;border:1px dashed var(--brd);
              border-radius:8px;padding:12px;margin-top:8px}

/* ═══ AJUDA / MODAL ════════════════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;
  display:flex;align-items:center;justify-content:center;padding:16px;
}
.modal{
  background:var(--card);border-radius:14px;
  width:100%;max-width:600px;max-height:90vh;
  display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.3);
}
.modal-hdr{
  padding:16px 20px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--brd);
  flex-shrink:0;
}
.modal-hdr-title{font-size:16px;font-weight:700;color:var(--azul)}
.modal-close{background:none;border:none;font-size:20px;color:var(--txt2);
             cursor:pointer;padding:2px 6px;border-radius:4px}
.modal-close:hover{background:var(--bg)}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.help-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px}
.help-tab{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;
          background:var(--bg);border:1px solid var(--brd);cursor:pointer;color:var(--txt2)}
.help-tab.active{background:var(--azul);color:#fff;border-color:var(--azul)}
.help-content h3{font-size:13px;font-weight:700;color:var(--azul);margin:14px 0 6px}
.help-content h3:first-child{margin-top:0}
.help-content p{font-size:12px;color:var(--txt2);line-height:1.6;margin-bottom:8px}
.help-content ol,.help-content ul{font-size:12px;color:var(--txt2);
  line-height:1.6;padding-left:18px;margin-bottom:8px}
.help-content code{background:#f0f3f8;border:1px solid var(--brd);
  padding:1px 5px;border-radius:3px;font-size:11px;font-family:monospace}

/* ═══ TOAST ═════════════════════════════════════════════════ */
.toast{
  position:fixed;bottom:20px;right:20px;z-index:1000;
  background:#1F3A5F;color:#fff;padding:10px 16px;border-radius:8px;
  font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;
  max-width:320px;box-shadow:0 4px 16px rgba(0,0,0,.2);
}
.toast.show{opacity:1}

/* ═══ PRINT ══════════════════════════════════════════════════ */

/* ═══ WORKFLOW BAR ════════════════════════════════════════════ */
.workflow-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  padding:9px 14px;border-radius:8px;border:1.5px solid;margin-bottom:10px;
  transition:background .25s,border-color .25s}
.wf-badge{font-size:11px;font-weight:700;padding:3px 10px;
  border-radius:10px;color:#fff;flex-shrink:0}
.wf-info{font-size:11px;color:var(--txt2)}
.locked-notice{background:#fff8e1;border:1px solid var(--larj);
  border-radius:6px;padding:6px 12px;font-size:12px;color:#7c5a00;margin-bottom:8px}
/* ═══ ATRIBUIÇÕES ══════════════════════════════════════════════ */
.assign-annot{font-size:10px;color:var(--larj);font-style:italic;
  margin-top:2px;display:flex;align-items:center;gap:3px}
.assign-sec{font-size:10px;opacity:.8;font-style:italic;
  margin-left:6px;display:inline-flex;align-items:center;gap:3px}
.btn-assign{font-size:10px;padding:1px 7px;border-radius:3px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);
  color:#fff;cursor:pointer;white-space:nowrap}
.btn-assign:hover{background:rgba(255,255,255,.25)}
/* Operações em bloco — barra do formulário todo + botões por seção (R4) */
.bulk-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:12px;
  padding:8px 12px;background:#eef2f7;border:1px solid var(--brd);border-radius:8px}
.bulk-bar .bulk-lbl{font-size:12px;font-weight:600;color:var(--txt2);margin-right:2px}
.bulk-btn{font-size:12px;padding:3px 10px;border-radius:5px;border:1px solid var(--brd);
  background:#fff;color:var(--txt);cursor:pointer;white-space:nowrap}
.bulk-btn:hover{background:var(--azul);color:#fff;border-color:var(--azul)}
.sec-bulk-btn{font-size:11px;line-height:1;padding:2px 6px;border-radius:3px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);color:#fff;cursor:pointer}
.sec-bulk-btn:hover{background:rgba(255,255,255,.28)}
/* ═══ VISIBILIDADE (seções ocultas) ════════════════════════════ */
.sec-hidden-badge{font-size:9px;background:rgba(0,0,0,.2);
  color:#fff;padding:1px 5px;border-radius:3px;margin-left:4px}
/* ═══ MODAL GENÉRICO ═══════════════════════════════════════════ */
.sig-select-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sig-select-row input{flex:1}


/* ═══ FASE 3 — RELATÓRIO / HISTÓRICO ════════════════════════ */
.report-opt{display:flex;align-items:center;gap:10px;
  padding:10px 14px;border:1px solid var(--brd);border-radius:8px;
  margin-bottom:8px;cursor:pointer;transition:background .1s}
.report-opt:hover{background:var(--bg)}
.report-opt input{flex-shrink:0}
.report-opt-info strong{font-size:13px;display:block}
.report-opt-info small{font-size:11px;color:var(--txt2)}
.history-section{margin-top:16px;margin-bottom:14px}
.history-hdr{font-size:13px;font-weight:700;color:var(--azul);
  border-bottom:2px solid var(--azul2);padding-bottom:5px;margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between}
.history-row{display:flex;align-items:center;gap:10px;padding:8px 12px;
  background:var(--card);border:1px solid var(--brd);border-radius:6px;margin-bottom:4px}
.history-code{font-weight:700;font-size:13px;color:var(--azul);min-width:160px}
.history-meta{font-size:11px;color:var(--txt2);flex:1}
.code-stamp{font-family:monospace;font-size:10px;background:#f0f3f8;
  padding:3px 7px;border-radius:4px;color:var(--azul)}

@media print{
  .topbar,.no-print{display:none!important}
  body{font-size:9pt;background:#fff}
  .sec-wrap{break-inside:avoid;border:1px solid #ccc!important}
  .tbl td,.tbl th{padding:2pt 5pt;font-size:8pt}
  .rb-lbl input{display:none}
  .rb-lbl.ok::before{content:"●";color:#1F7A1F;margin-right:3pt}
  .rb-lbl.pend::before{content:"●";color:#C0392B;margin-right:3pt}
  .rb-lbl.na::before{content:"●";color:#7F8C8D;margin-right:3pt}
  .rb-lbl:not(.ok):not(.pend):not(.na)::before{content:"○";color:#ccc;margin-right:3pt}
  .obs-ta{border:none;border-bottom:.5px solid #ccc!important;resize:none}
}

/* ═══ OVERLAY DE ROTAÇÃO (mobile portrait) ═════════════════ */
#rotate-overlay{
  position:fixed;inset:0;background:rgba(31,58,95,.96);
  z-index:9999;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  color:#fff;text-align:center;padding:32px 24px;
}
#rotate-overlay .rot-icon{font-size:56px;margin-bottom:16px;animation:spin-hint 2s ease-in-out infinite alternate}
#rotate-overlay .rot-title{font-size:18px;font-weight:700;margin-bottom:8px}
#rotate-overlay .rot-sub{font-size:13px;opacity:.8;margin-bottom:28px;line-height:1.5}
#rotate-overlay .rot-btn{
  background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.5);
  color:#fff;padding:11px 22px;border-radius:8px;font-size:13px;
  cursor:pointer;font-family:inherit;
}
#rotate-overlay .rot-btn:hover{background:rgba(255,255,255,.3)}
@keyframes spin-hint{from{transform:rotate(0deg)}to{transform:rotate(15deg)}}

/* ═══ FIXES PORTRAIT MOBILE ════════════════════════════════ */
@media (max-width:600px){
  .ident-card{grid-template-columns:1fr!important}
  .tbl th.c-obs,.tbl td.c-obs{display:none}
  .tbl th.c-mom,.tbl td.c-mom{display:none}
  .tbl th.c-status,.tbl td.c-status{width:95px}
  .rb-lbl{font-size:10px;padding:2px 4px}
  .summ-grid{grid-template-columns:repeat(3,1fr)!important}
  .sig-grid{grid-template-columns:1fr!important}
  .topbar-title{font-size:13px}
  .admin-panel{width:100vw!important}
}
</style>
</head>

<div id="app"></div>
<div class="toast" id="toast"></div>
<div id="admin-root"></div>
<div id="help-root"></div>

<div id="rotate-overlay">
  <div class="rot-icon">📱</div>
  <div class="rot-title">Para melhor experiência</div>
  <div class="rot-sub">Este sistema foi desenhado para uso na <strong>horizontal</strong>.<br>
    Vire o celular para continuar.</div>
  <button class="rot-btn" onclick="dismissRotate()">Usar na vertical mesmo</button>
</div>

let _rotateDismissed = false;
function checkOrientation() {
  const overlay = document.getElementById("rotate-overlay");
  if (!overlay) return;
  const isPortrait = window.innerHeight > window.innerWidth;
  const isMobile   = window.innerWidth < 768 || ("ontouchstart" in window);
  if (isPortrait && isMobile && !_rotateDismissed) {
    overlay.style.display = "flex";
  } else {
    overlay.style.display = "none";
    if (!isPortrait) _rotateDismissed = false; // reset ao virar de volta
  }
}
function dismissRotate() {
  _rotateDismissed = true;
  const o = document.getElementById("rotate-overlay");
  if (o) o.style.display = "none";
}
window.addEventListener("resize", checkOrientation);
window.addEventListener("orientationchange", () => setTimeout(checkOrientation, 350));

function fbListen(ref, ev, fn) {
  ref.on(ev, fn);
  _listeners.push({ref, ev, fn});
}
function fbUnlisten() {
  _listeners.forEach(({ref, ev, fn}) => ref.off(ev, fn));
  _listeners = [];
}

function initApp() {
  const CFG = window.APP_CONFIG || {};
  if (!CFG.FIREBASE || !CFG.FIREBASE.apiKey) {
    document.getElementById("app").innerHTML = renderFirebaseMissing();
    return;
  }
  try {
    fbApp = firebase.initializeApp(CFG.FIREBASE);
    db   = firebase.database();
    auth = firebase.auth();
  } catch(e) {
    document.getElementById("app").innerHTML = renderFirebaseMissing();
    return;
  }
  setScreen("loading");
  auth.onAuthStateChanged(handleAuthChange);
}

async function handleAuthChange(user) {
  if (!user) { setScreen("login"); return; }
  const dom = (window.APP_CONFIG||{}).ALLOWED_DOMAINS||[];
  if (dom.length && !dom.some(d => user.email.endsWith("@"+d))) {
    await auth.signOut();
    S.loginErr = "Domínio de e-mail não autorizado: " + user.email;
    setScreen("login");
    return;
  }
  S.user = user;
  // Verificar se é o primeiro usuário
  const usersSnap = await db.ref("users").once("value");
  const isFirst = !usersSnap.exists();
  // Carregar ou criar perfil
  const profSnap = await db.ref("users/" + user.uid).once("value");
  if (profSnap.exists()) {
    S.profile = profSnap.val();
    if (!S.profile.approved && !S.profile.isSuperUser) { setScreen("pending"); return; }
    // Carregar config geral
    await loadAppConfig();
    // Decidir tela — usuário retornando com perfil existente vai direto ao app
    // (perfil sem localidades só redireciona para perfil se for superusuário sem localidades ainda)
    if (!S.profile.locations || S.profile.locations.length === 0) {
      if (S.profile.isSuperUser) {
        // Superusuário retornando sem localidades: app + admin aberto
        S.checklist = S.checklist || { id: null, data: {} };
        S.context   = S.context   || {};
        setScreen("app");
        setTimeout(() => { showAdmin(); toast("Cadastre suas localidades no Painel Admin (⚙).", "ok"); }, 350);
      } else {
        // Usuário comum sem localidades: vai para app e vê aviso (não bloqueia)
        S.checklist = S.checklist || { id: null, data: {} };
        S.context   = S.context   || {};
        setScreen("app");
        setTimeout(() => toast("Nenhuma localidade associada ao seu perfil. Aguarde o superusuário configurar.", "err"), 400);
      }
      return;
    } else if (S.profile.locations.length === 1) {
      const loc = S.profile.locations[0];
      await resolveContextFromLoc(loc);
      await loadOrCreateChecklist();
      setScreen("app");
    } else {
      setScreen("select");
    }
  } else {
    // Novo usuário
    const newProfile = {
      name: user.displayName || "",
      email: user.email,
      photoURL: user.photoURL || "",
      role: "diacono",
      functions: [],
      isSuperUser: isFirst,
      isSiteAdmin: false,
      approved: isFirst,
      locations: [],
      createdAt: firebase.database.ServerValue.TIMESTAMP,
      personalDriveFolder: "",
      systemDriveFolder: "",
    };
    await db.ref("users/" + user.uid).set(newProfile);
    S.profile = newProfile;
    if (isFirst) {
      await loadAppConfig();
      setScreen("profile");
      toast("Bem-vindo! Você é o superusuário desta instalação.", "ok");
    } else {
      setScreen("pending");
    }
  }
}

async function loadAppConfig() {
  const snap = await db.ref("appConfig").once("value");
  S.appCfg = snap.val() || {};
  S.locations = S.appCfg.locations || {};
  S.loginImgPct = S.appCfg.loginImageSize || (window.APP_CONFIG||{}).LOGIN_IMAGE_SIZE_PCT || 100;

async function resolveContextFromLoc(loc) {
  const locs = S.locations;
  S.context = {
    rrmId: loc.rrmId, rmaId: loc.rmaId, pointId: loc.pointId,
    rrmName: locs[loc.rrmId]?.name || loc.rrmId,
    rmaName: locs[loc.rrmId]?.rmas?.[loc.rmaId]?.name || loc.rmaId,
    pointName: locs[loc.rrmId]?.rmas?.[loc.rmaId]?.points?.[loc.pointId]?.name || loc.pointId,
    pointCity: locs[loc.rrmId]?.rmas?.[loc.rmaId]?.points?.[loc.pointId]?.city || "",
    hiddenSections: [], hiddenItems: [],
  };
  await loadVisibilityForContext();
}

function setScreen(name) {
  S.screen = name;
  const app = document.getElementById("app");
  if (!app) return;
  const renders = {
    loading:    renderLoading,
    login:      renderLogin,
    pending:    renderPending,
    profile:    renderProfileScreen,
    select:     renderSelectScreen,
    app:        renderMainApp,
    fechamento: renderFechamento,
  };
  app.innerHTML = (renders[name] || (() => "<p>Tela inválida</p>"))();
  if (name === "app") setupChecklistListeners();
  // Ao exibir tela de perfil, popular RML e Ponto com base na RRM já selecionada
  if (name === "profile") setTimeout(() => { updateRmaOpts(); }, 0);
}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function initials(n){return (n||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()}
// isPrivileged: superusuário OU administrador do site têm acesso pleno ao app
function isPrivileged() { return !!(S.profile?.isSuperUser || S.profile?.isSiteAdmin); }

function toggleFunc(el) {
  const p = S.profile; if (!p) return;
  p.functions = p.functions || [];
  if (el.checked) { if (!p.functions.includes(el.value)) p.functions.push(el.value); }
  else { p.functions = p.functions.filter(f => f !== el.value); }
  el.closest("label").classList.toggle("selected", el.checked);
}

function updateRmaOpts() {
  const rrmId = document.getElementById("add-rrm")?.value;
  const rmas = S.locations[rrmId]?.rmas || {};
  const sel = document.getElementById("add-rma");
  if (!sel) return;
  sel.innerHTML = Object.entries(rmas).map(([id,v])=>`<option value="${id}">${esc(v.name)}</option>`).join("") || "<option value=''>—</option>";
  updatePtOpts();
}
function updatePtOpts() {
  const rrmId = document.getElementById("add-rrm")?.value;
  const rmaId = document.getElementById("add-rma")?.value;
  const pts = S.locations[rrmId]?.rmas?.[rmaId]?.points || {};
  const sel = document.getElementById("add-pt");
  if (!sel) return;
  sel.innerHTML = Object.entries(pts).map(([id,v])=>`<option value="${id}">${esc(v.name)}</option>`).join("") || "<option value=''>—</option>";
}
function addLocToProfile() {
  const rrmId = document.getElementById("add-rrm")?.value;
  const rmaId = document.getElementById("add-rma")?.value;
  const ptId  = document.getElementById("add-pt")?.value;
  if (!rrmId || !rmaId || !ptId || rmaId === "" || ptId === "") {
    toast("Selecione RRM, RML e ponto de atendimento.", "err"); return;
  }
  S.profile.locations = S.profile.locations || [];
  if (S.profile.locations.some(l => l.rrmId===rrmId && l.rmaId===rmaId && l.pointId===ptId)) {
    toast("Localidade já adicionada.","err"); return;
  }
  S.profile.locations.push({rrmId, rmaId, pointId: ptId});
  setScreen("profile");
}
function removeLoc(i) {
  S.profile.locations.splice(i, 1);
  setScreen("profile");
}
async function saveProfile() {
  const p = S.profile;
  p.name = document.getElementById("pf-name")?.value.trim() || p.name;
  p.role = document.getElementById("pf-role")?.value || p.role;
  if (p.isSuperUser) {
    p.systemDriveFolder = document.getElementById("pf-sysdrv")?.value.trim() || "";
    // Salvar pasta do sistema no appConfig para que outros usuários possam consultá-la
    if (p.systemDriveFolder) {
      await db.ref("appConfig/systemDriveFolder").set(p.systemDriveFolder);
      if (S.appCfg) S.appCfg.systemDriveFolder = p.systemDriveFolder;
    }
  }
  p.personalDriveFolder = document.getElementById("pf-mydrv")?.value.trim() || "";
  if (!p.name) { toast("Informe o nome completo.","err"); return; }
  // Superusuário pode salvar sem localidades (vai ao Painel Admin para cadastrá-las)
  if (!p.locations || p.locations.length === 0) {
    if (!p.isSuperUser) { toast("Adicione ao menos uma localidade.","err"); return; }
  }
  await db.ref("users/" + S.user.uid).update(p);
  toast("Perfil salvo ✓");
  if (!p.locations || p.locations.length === 0) {
    // Superusuário sem localidades: ir para o app e abrir Painel Admin automaticamente
    S.checklist = S.checklist || { id: null, data: {} };
    S.context   = S.context   || {};
    setScreen("app");
    setTimeout(() => {
      showAdmin();
      toast("Cadastre suas localidades no Painel Admin (⚙).", "ok");
    }, 350);
    return;
  }
  if (p.locations.length === 1) {
    await resolveContextFromLoc(p.locations[0]);
    await loadOrCreateChecklist();
    setScreen("app");
  } else { setScreen("select"); }
}

}

// ── Combobox de localidade com filtro digitável (R2) ────────
// Cada item = "Ponto — RML · RRM"; o filtro casa qualquer parte, em qualquer posição.
function locComboItems() {
  const locs = S.profile?.locations || [];
  const c = S.context || {};
  return locs.map((loc, i) => {
    const rrmN = S.locations[loc.rrmId]?.name || loc.rrmId;
    const rmaN = S.locations[loc.rrmId]?.rmas?.[loc.rmaId]?.name || loc.rmaId;
    const ptN  = S.locations[loc.rrmId]?.rmas?.[loc.rmaId]?.points?.[loc.pointId]?.name || loc.pointId;
    const cur  = (loc.rrmId===c.rrmId && loc.rmaId===c.rmaId && loc.pointId===c.pointId);
    return { i, label: `${ptN} — ${rmaN} · ${rrmN}`, cur };
  });
}
let _locComboHi = -1;   // item destacado na lista filtrada (navegação por teclado)
function renderLocComboList(term) {
  const box = document.getElementById("ctx-point-list");
  if (!box) return;
  const t = (term || "").trim().toLowerCase();
  const items = locComboItems().filter(o => !t || o.label.toLowerCase().includes(t));
  box._items = items;   // guarda a lista filtrada atual (para o teclado)
  if (_locComboHi >= items.length) _locComboHi = items.length - 1;
  box.style.display = "block";
  box.innerHTML = items.length
    ? items.map((o, idx) => `<div class="loc-combo-item${o.cur?' cur':''}${idx===_locComboHi?' hi':''}" onmousedown="selectLocation(${o.i})">${esc(o.label)}</div>`).join("")
    : `<div class="loc-combo-empty">Nenhuma localidade encontrada</div>`;
}
function highlightLocCombo() {
  const box = document.getElementById("ctx-point-list");
  if (!box) return;
  Array.from(box.querySelectorAll(".loc-combo-item")).forEach((el, idx) => {
    el.classList.toggle("hi", idx === _locComboHi);
    if (idx === _locComboHi) el.scrollIntoView({ block: "nearest" });
  });
}
// Teclado: ↓/↑ e Tab/Shift+Tab movem; Enter escolhe; Esc fecha
function locComboKey(e) {
  const box = document.getElementById("ctx-point-list");
  if (!box || box.style.display === "none") return;
  const items = box._items || [];
  const n = items.length;
  const k = e.key;
  if (k === "ArrowDown" || (k === "Tab" && !e.shiftKey)) {
    if (!n) return;
    e.preventDefault(); _locComboHi = (_locComboHi + 1) % n; highlightLocCombo();
  } else if (k === "ArrowUp" || (k === "Tab" && e.shiftKey)) {
    if (!n) return;
    e.preventDefault(); _locComboHi = (_locComboHi - 1 + n) % n; highlightLocCombo();
  } else if (k === "Enter") {
    if (_locComboHi >= 0 && _locComboHi < n) { e.preventDefault(); selectLocation(items[_locComboHi].i); }
  } else if (k === "Escape") {
    box.style.display = "none"; _locComboHi = -1;
  }
}
function openLocCombo() { _locComboHi = -1; renderLocComboList(""); }
function closeLocCombo() {
  // Delay para permitir o clique (onmousedown) num item antes de esconder;
  // se nada for selecionado, restaura o texto do ponto atual no campo.
  setTimeout(() => {
    const box = document.getElementById("ctx-point-list");
    const inp = document.getElementById("ctx-point-input");
    if (box) box.style.display = "none";
    if (inp) inp.value = S.context?.pointName || "";
    _locComboHi = -1;
  }, 150);
}

// Injeta seção de histórico depois do DOM estar pronto
function injectHistory() {
  const appBody = document.querySelector(".app-body");
  if (!appBody) return;
  const existing = document.getElementById("history-section");
  if (existing) existing.remove();
  const div = document.createElement("div");
  div.id = "history-section"; div.className = "history-section no-print";
  div.innerHTML = "<div class='history-hdr'>📋 Histórico de Relatórios<span id='hist-load' style='font-size:11px;color:var(--txt2)'>Carregando…</span></div><div id='hist-rows'></div>";
  // Inserir antes do último div (créditos)
  const last = appBody.querySelector("div[style*='10px 0 20px']");
  if (last) appBody.insertBefore(div, last); else appBody.appendChild(div);
  loadHistory();
}

function rbGroupHtml(id, status) {
  const cls = (v) => "rb-lbl" + (status===v ? (v==="OK"?" ok":v==="PEND"?" pend":" na") : "");
  const chk = (v) => status===v ? "checked" : "";
  return `<div class="rb-group">
<label class="${cls("OK")}" onclick="rbClick(event,${id},'OK')"><input type="radio" name="s${id}" ${chk("OK")}><span class="sym-ok">✓</span> Realizado</label>
<label class="${cls("PEND")}" onclick="rbClick(event,${id},'PEND')"><input type="radio" name="s${id}" ${chk("PEND")}><span class="sym-pend">✗</span> Pendente</label>
<label class="${cls("NA")}" onclick="rbClick(event,${id},'NA')"><input type="radio" name="s${id}" ${chk("NA")}><span class="sym-na">⊘</span> N/A</label>
</div>`;
}

  const ctx = S.context;
  const month = new Date().toISOString().slice(0,7);
  // Buscar checklist existente para este ponto+mês
  const snap = await db.ref("checklists").orderByChild("pointId").equalTo(ctx.pointId).once("value");
  let found = null;
  if (snap.exists()) {
    snap.forEach(ch => {
      const v = ch.val();
      if (v.month === month && v.rmaId === ctx.rmaId && v.status !== "published") {
        found = {id: ch.key, data: v};
      }
    });
  }
  if (found) {
    S.checklist = found;
  } else {
    const newRef = db.ref("checklists").push();
    const newData = {
      month, status:"draft",
      rrmId:ctx.rrmId, rmaId:ctx.rmaId, pointId:ctx.pointId,
      createdBy: S.user.uid, createdByName: S.profile?.name||"",
      createdAt: firebase.database.ServerValue.TIMESTAMP,
      contributors: { [S.user.uid]: true },
      items: {}, fields: {}, signames: ["","","",""],
    };
    await newRef.set(newData);
    S.checklist = {id: newRef.key, data: newData};
  }
}

function setupChecklistListeners() {
  if (!S.checklist.id) return;
  // Soltar listeners do contexto anterior antes de registrar os novos
  // (evita listener/presença duplicados ao trocar de localidade)
  fbUnlisten();
  const clRef = db.ref("checklists/" + S.checklist.id);
  S.clRef = clRef;
  // Injetar seção de histórico após DOM renderizado
  setTimeout(injectHistory, 100);
  // Ouvir mudanças em tempo real
  fbListen(clRef, "value", snap => {
    if (!snap.exists()) return;
    const prev = S.checklist.data || {};
    S.checklist.data = snap.val();
    refreshChecklistUI(prev, S.checklist.data);
    refreshSumm();
    refreshWorkflowBar();
  });
  // Presença
  setupPresence(S.checklist.id);
}

function refreshChecklistUI(prev, curr) {
  const prevItems = prev.items || {};
  const currItems = curr.items || {};
  // Atualizar apenas itens que mudaram
  Object.keys(currItems).forEach(key => {
    const id = parseInt(key);
    const pi = prevItems[key] || {};
    const ci = currItems[key] || {};
    if (pi.status !== ci.status || pi.obs !== ci.obs || pi.updatedByName !== ci.updatedByName) {
      const el = document.getElementById("rbg" + id);
      const el2 = document.getElementById("rbg" + id);
      if (el2) el2.outerHTML = `<td class="c-status" id="rbg${id}">${rbGroupHtml(id, ci.status||"")}</td>`;
      const obsEl = document.getElementById("obs" + id);
      if (obsEl && document.activeElement !== obsEl) obsEl.value = ci.obs || "";
      // Atualizar "alterado por"
      const row = document.querySelector(`#obs${id}`)?.closest("tr");
      if (row) {
        const aDiv = row.querySelector(".alt-by");
        const myName = S.profile?.name || "";
        const updBy = ci.updatedByName || "";
        const shouldShow = updBy && updBy !== myName;
        if (shouldShow && !aDiv) {
          const acaoTd = row.querySelector(".acao");
          if (acaoTd) acaoTd.insertAdjacentHTML("afterend",`<div class="alt-by">Alterado por: ${esc(updBy)}</div>`);
        } else if (!shouldShow && aDiv) aDiv.remove();
      }
      // Atualizar status da seção
      const item = ITEMS.find(it => it[0] === id);
      if (item) refreshSecStatus(item[4]);
    }
  });
}

function rbClick(ev, id, val) {
  ev.preventDefault(); ev.stopPropagation();
  const cur = S.checklist.data?.items?.[String(id).padStart(3,"0")]?.status || "";
  setStatus(id, cur === val ? "" : val);
}

function canEdit() {
  const st = S.checklist.data?.status || "draft";
  if (st === "publicado") return false;
  if (st === "em_revisao") {
    return S.checklist.data?.reviewedBy === S.user?.uid || isPrivileged();
  }
  return true;
}

function setStatus(id, val) {
  if (!canEdit()) { toast("Documento bloqueado para edição","err"); return; }
  const key = String(id).padStart(3,"0");
  if (!S.clRef) return;
  const upd = {
    status: val, obs: S.checklist.data?.items?.[key]?.obs || "",
    updatedBy: S.user.uid, updatedByName: S.profile?.name || "",
    updatedAt: firebase.database.ServerValue.TIMESTAMP,
  };
  S.clRef.child("items/" + key).update(upd);
  // Registrar contribuidor
  S.clRef.child("contributors/" + S.user.uid).set(true);
  // Update local state imediato (antes do Firebase responder)
  if (!S.checklist.data.items) S.checklist.data.items = {};
  S.checklist.data.items[key] = {...(S.checklist.data.items[key]||{}), ...upd};
  // Atualizar UI local
  const el = document.getElementById("rbg"+id);
  if (el) el.outerHTML = `<td class="c-status" id="rbg${id}">${rbGroupHtml(id, val)}</td>`;
  refreshSecStatus(ITEMS.find(it=>it[0]===id)?.[4]);
  refreshSumm();
}

let _obsTimers = {};
function setObs(id, val) {
  const key = String(id).padStart(3,"0");
  if (!S.checklist.data.items) S.checklist.data.items = {};
  if (!S.checklist.data.items[key]) S.checklist.data.items[key] = {};
  S.checklist.data.items[key].obs = val;
  clearTimeout(_obsTimers[id]);
  _obsTimers[id] = setTimeout(() => {
    if (!S.clRef) return;
    S.clRef.child("items/" + key + "/obs").set(val);
    S.clRef.child("contributors/" + S.user.uid).set(true);
  }, 800);
}
function setField(k, v) {
  if (!S.clRef) return;
  S.clRef.child("fields/" + k).set(v);
  if (!S.checklist.data.fields) S.checklist.data.fields = {};
  S.checklist.data.fields[k] = v;
  if (k === "mes") {
    // Recalcular prazo máximo de fechamento (dia 20 do mês seguinte)
    const dp = document.getElementById("fld-dataprev");
    if (dp) dp.value = calcDataPrev(v);
  }
  if (k === "municipio") {
    // Atualizar município em todos os campos de assinatura
    document.querySelectorAll(".municipio-display").forEach(el => {
      el.textContent = (v || "Coxim/MS");
    });
  }
}
function setSig(i, v) {
  if (!S.clRef) return;
  const sigs = S.checklist.data.signames || ["","","",""];
  sigs[i] = v; S.checklist.data.signames = sigs;
  S.clRef.child("signames/" + i).set(v);
}
function calcDataPrev(month) {
  if (!month) return "dia 20 do mês seguinte";
  try {
    const [y, m] = month.split("-").map(Number);
    const next = m === 12 ? new Date(y+1, 0, 20) : new Date(y, m, 20);
    return "20/" + String(next.getMonth()+1).padStart(2,"0") + "/" + next.getFullYear();
  } catch { return "dia 20 do mês seguinte"; }
}

// Operações em bloco (R4): define/limpa o STATUS de vários itens de uma vez.
// scope = índice da seção OU "all" (formulário todo). val = "PEND" | "NA" | "" (limpar).
// IMPORTANTE: altera SOMENTE o status. Observações e demais campos ficam intactos.
function bulkStatus(scope, val) {
  if (!canEdit()) { toast("Documento bloqueado para edição","err"); return; }
  if (!S.clRef) return;
  const ids = scope === "all"
    ? ITEMS.map(it => it[0])
    : ITEMS.filter(it => it[4] === scope).map(it => it[0]);
  if (!ids.length) return;
  const alvo = scope === "all" ? "TODOS os itens do formulário" : "todos os itens desta seção";
  const acao = val === "PEND" ? "marcar como PENDENTE" : val === "NA" ? "marcar como N/A" : "LIMPAR as escolhas de";
  if (!confirm(`Confirma ${acao} ${alvo}?\n\nApenas o STATUS é alterado — observações e os demais campos não mudam.`)) return;
  const upd = {};
  ids.forEach(id => {
    const k = String(id).padStart(3,"0");
    upd[`items/${k}/status`]        = val;   // "" limpa; "PEND"/"NA" define
    upd[`items/${k}/updatedBy`]     = S.user.uid;
    upd[`items/${k}/updatedByName`] = S.profile?.name || "";
    upd[`items/${k}/updatedAt`]     = firebase.database.ServerValue.TIMESTAMP;
  });
  S.clRef.update(upd);
  S.clRef.child("contributors/" + S.user.uid).set(true);
  toast(val === "" ? "Escolhas limpas ✓" : (val === "PEND" ? "Itens marcados como Pendente ✓" : "Itens marcados como N/A ✓"));
}
function confirmResetAll() {
  if (!confirm("Limpar TODOS os campos para iniciar um novo mês?\nEsta ação não pode ser desfeita.")) return;
  if (!S.clRef) return;
  S.clRef.child("items").remove();
  S.clRef.child("fields").remove();
  S.clRef.child("signames").remove();
  S.clRef.update({
    month: new Date().toISOString().slice(0,7),
    status: "draft", contributors: {[S.user.uid]: true},
    createdBy: S.user.uid, createdByName: S.profile?.name||"",
    createdAt: firebase.database.ServerValue.TIMESTAMP,
  }).then(() => {
    // BUG-01: Re-renderizar a tela para limpar os campos visualmente
    setScreen("app");
    toast("Checklist limpo para o novo mês ✓");
  });
}

// ═══════════════════════════════════════════════════════════
function calcSecStatus(si) {
  const sec = SECS.find(s => s[0] === si);
  if (!sec) return "st-neutro";
  const items = S.checklist.data?.items || {};
  let ok=0, pend=0, na=0, sem=0, total=sec[4]-sec[3]+1;
  for (let i = sec[3]; i <= sec[4]; i++) {
    const v = items[String(i).padStart(3,"0")]?.status || "";
    if (v==="OK") ok++; else if (v==="PEND") pend++;
    else if (v==="NA") na++; else sem++;
  }
  if (ok===0 && pend===0 && na===0) return "st-neutro";
  if (pend > 0) return "st-pendente";
  if (na === total) return "st-na";
  if (ok+na === total) return ok===total ? "st-realizado" : "st-ressalvas";
  return "st-andamento";
}
function refreshSecStatus(si) {
  if (!si) return;
  const wrap = document.getElementById("sec-wrap-" + si);
  if (!wrap) return;
  const stClasses = ["st-neutro","st-andamento","st-realizado","st-ressalvas","st-pendente","st-na"];
  const labels = {
    "st-neutro":"AGUARDANDO","st-andamento":"EM ANDAMENTO","st-realizado":"REALIZADO ✓",
    "st-ressalvas":"REALIZADO c/ N/A","st-pendente":"PENDENTE ⚠","st-na":"N/A"
  };
  stClasses.forEach(c => wrap.classList.remove(c));
  const newClass = calcSecStatus(si);
  wrap.classList.add(newClass);
  const badge = wrap.querySelector(".sec-status-badge");
  if (badge) badge.textContent = labels[newClass] || "";
}

function calcSumm() {
  let ok=0, pend=0, na=0, sem=0;
  const items = S.checklist.data?.items || {};
  for (let i=1;i<=90;i++) {
    const v = items[String(i).padStart(3,"0")]?.status || "";
    if(v==="OK")ok++;else if(v==="PEND")pend++;else if(v==="NA")na++;else sem++;
  }
  return {ok,pend,na,sem};
}
function refreshSumm() {
  const {ok,pend,na,sem} = calcSumm();
  const el = document.getElementById("summ-area");
  if (el) el.innerHTML = `
    <div class="summ-c"><div class="summ-n" style="color:var(--azul)">${ok+pend+na}</div><div class="summ-l">verificados / 90</div></div>
    <div class="summ-c"><div class="summ-n" style="color:var(--verde)">${ok}</div><div class="summ-l">✓ Realizados</div></div>
    <div class="summ-c"><div class="summ-n" style="color:var(--verm)">${pend}</div><div class="summ-l">✗ Pendentes</div></div>
    <div class="summ-c"><div class="summ-n" style="color:var(--cinza)">${na}</div><div class="summ-l">⊘ N/A</div></div>
    <div class="summ-c"><div class="summ-n" style="color:#aaa">${sem}</div><div class="summ-l">sem resposta</div></div>`;
}

async function deleteRrm(rrmId) {
  if (!confirm("Excluir esta RRM e todas as suas localidades?")) return;
  await db.ref("appConfig/locations/" + rrmId).remove();
  delete S.locations[rrmId];
  renderAdminPanel();
}
async function addRma(rrmId) {
  const name = prompt("Nome da nova RML (ex.: RML-Coxim.MS):"); if (!name) return;
  const ref = db.ref(`appConfig/locations/${rrmId}/rmas`).push();
  await ref.set({name, points:{}});
  if (!S.locations[rrmId].rmas) S.locations[rrmId].rmas = {};
  S.locations[rrmId].rmas[ref.key] = {name, points:{}};
  toast("RML adicionada ✓"); renderAdminPanel();
}
async function deleteRma(rrmId, rmaId) {
  if (!confirm("Excluir esta RML e todos seus pontos?")) return;
  await db.ref(`appConfig/locations/${rrmId}/rmas/${rmaId}`).remove();
  delete S.locations[rrmId].rmas[rmaId];
  renderAdminPanel();
}
async function addPoint(rrmId, rmaId) {
  const name = prompt("Nome do ponto de atendimento (ex.: PIA-Coxim):"); if (!name) return;
  const city = prompt("Cidade sede deste ponto (ex.: Coxim):") || "";
  const ref = db.ref(`appConfig/locations/${rrmId}/rmas/${rmaId}/points`).push();
  await ref.set({name, city});
  if (!S.locations[rrmId].rmas[rmaId].points) S.locations[rrmId].rmas[rmaId].points = {};
  S.locations[rrmId].rmas[rmaId].points[ref.key] = {name, city};
  toast("Ponto adicionado ✓"); renderAdminPanel();
}
async function deletePoint(rrmId, rmaId, ptId) {
  if (!confirm("Excluir este ponto de atendimento?")) return;
  await db.ref(`appConfig/locations/${rrmId}/rmas/${rmaId}/points/${ptId}`).remove();
  delete S.locations[rrmId].rmas[rmaId].points[ptId];
  renderAdminPanel();
}

function toast(msg, type) {
  const el = document.getElementById("toast"); if (!el) return;
  el.textContent = msg;
  el.style.background = type==="err" ? "#a33" : type==="ok" ? "#1F7A1F" : "#1F3A5F";
  el.classList.add("show");
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove("show"), 3000);
}

function refreshWorkflowBar() {
  // Re-renderizar apenas a barra de workflow sem refazer toda a tela
  const wfState = S.checklist.data?.status || "draft";
  const wf = WF_STATES[wfState] || WF_STATES.draft;
  const bars = document.querySelectorAll(".workflow-bar");
  if (!bars.length) return;
  const contribs = S.checklist.data?.contributors || {};
  const contribCount = Object.keys(contribs).length;
  let wfButtons = "";
  if (wfState === "draft") {
    wfButtons = `<button class="btn btn-primary btn-sm no-print" onclick="showSendReviewModal()">→ Enviar para Revisão</button>`;
  } else if (wfState === "em_revisao") {
    const revName = S.checklist.data?.reviewedByName || "—";
    const isRev = S.checklist.data?.reviewedBy === S.user?.uid || isPrivileged();
    wfButtons = `<span class="wf-info">Revisor: <strong>${esc(revName)}</strong></span>`;
    if (isRev) wfButtons += `<button class="btn btn-success btn-sm no-print" onclick="showPublishModal()">✅ Publicar</button>`;
  } else if (wfState === "publicado") {
    const pubAt = S.checklist.data?.publishedAt;
    const pubStr = pubAt ? new Date(pubAt).toLocaleString("pt-BR") : "—";
    wfButtons = `<span class="wf-info">Publicado em: <strong>${esc(pubStr)}</strong></span>
      <button class="btn btn-sm no-print" onclick="confirmReopen()">↺ Reabrir</button>`;
  }
  bars.forEach(bar => {
    bar.style.background = wf.bg;
    bar.style.borderColor = wf.color;
    bar.innerHTML = `<span class="wf-badge" style="background:${wf.color}">${wf.label}</span>
      <span class="wf-info">${contribCount} contribuidor(es)</span>
      <div style="flex:1"></div>${wfButtons}`;
  });
}

    .map(uid => users[uid]?.name || uid).filter(Boolean).join(", ");

  ).join("");
  document.getElementById("modal-root").innerHTML = `

  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-hdr-title">📋 Enviar para Revisão</span>

    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="lbl">Contribuidores registrados</label>
        <div style="font-size:12px;padding:8px;background:var(--bg);border-radius:6px;color:var(--txt2)">

        <select id="rev-sel" onchange="checkSelfReview(this)">
          <option value="">— selecione —</option>${userOpts}

        <div id="self-rev-warn" class="hint" style="color:var(--verm);display:none">

        </div>

          <input type="checkbox" id="notify-rev">
          Notificar revisor por e-mail
        </label>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="confirmSendReview()">Confirmar →</button>
        <button class="btn" onclick="closeModal()">Cancelar</button>
      </div>
    </div>
  </div></div>`;
}
function checkSelfReview(sel) {
  const uid = (sel.value||"").split("|")[0];
  const warn = document.getElementById("self-rev-warn");
  if (warn) warn.style.display = uid === S.user?.uid ? "block" : "none";
}
async function confirmSendReview() {
  const sel = document.getElementById("rev-sel");
  const val = sel?.value || "";
  if (!val) { toast("Selecione um revisor","err"); return; }
  if (!S.clRef) {
    toast("Checklist não conectado — adicione uma localidade no Perfil (👤) e salve.", "err");
    return;
  }
  const [revUid, revName] = val.split("|");
  const notify = document.getElementById("notify-rev")?.checked;
  try {
    await S.clRef.update({
      status: "em_revisao",
      reviewedBy: revUid,
      reviewedByName: revName,
      sentToReviewAt: firebase.database.ServerValue.TIMESTAMP,
      sentToReviewBy: S.user.uid,
      sentToReviewByName: S.profile?.name || "",
    });
  } catch(err) {
    toast("Erro ao enviar para revisão: " + (err.message || "verifique permissões Firebase"), "err");
    return;
  }

  // Confirmar revisão e fechar modal
  closeModal();
  toast("Checklist enviado para revisão ✓","ok");
  setScreen("app");

  // E-mail automático via proxy Apps Script (assíncrono, após fechar modal)
  if (notify) {
    const revSnap = await db.ref("users/" + revUid).once("value");
    const revEmail = revSnap.val()?.email || "";
    if (!revEmail) {
      setTimeout(() => toast("⚠ Revisor sem e-mail cadastrado no sistema.", "err"), 1200);
      return;
    }
    const proxyUrl = getAIProxyURL();
    if (proxyUrl) {
      try {
        const resp = await fetch(proxyUrl, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            action: "sendEmail",
            to: revEmail,
            toName: revName,
            subject: "Checklist CCB — aguardando sua revisão",
            body: `Olá, ${revName}!\n\nO checklist do mês foi enviado para sua revisão pelo sistema CCB PIA Compliance.\n\nAcesse: ${window.location.href}\n\nQue Deus abençoe.\n— ${S.profile?.name || "Equipe CCB"}`,
          }),
        });
        setTimeout(() => toast(
          resp.ok ? "✉ E-mail enviado automaticamente ao revisor ✓" : `⚠ E-mail não enviado (status ${resp.status}). Verifique o Apps Script.`,
          resp.ok ? "ok" : "err"
        ), 1200);
      } catch(emailErr) {
        setTimeout(() => toast("⚠ E-mail não enviado: " + emailErr.message, "err"), 1200);
      }
    } else {
      // Proxy não configurado: aviso claro e destacado
      setTimeout(() => toast(
        "⚠ E-MAIL NÃO ENVIADO — o proxy Apps Script não está configurado. Acesse o Painel Admin (⚙) → configure o AI_PROXY_URL.",
        "err"
      ), 1200);
    }
  }
}

  await S.clRef.update({
    status: "publicado",
    signames,
    publishedAt: firebase.database.ServerValue.TIMESTAMP,

async function confirmReopen() {
  if (!confirm("Reabrir este relatório?\nO original será marcado como ANULADO e uma nova versão será criada.")) return;
  const oldId = S.checklist.id;
  // Marcar original como anulado
  await db.ref("checklists/" + oldId + "/status").set("anulado");
  await db.ref("checklists/" + oldId + "/anuladoEm").set(firebase.database.ServerValue.TIMESTAMP);
  await db.ref("checklists/" + oldId + "/anuladoPor").set(S.profile?.name || S.user?.uid);
  // Criar nova versão
  const oldData = S.checklist.data;
  const newRef = db.ref("checklists").push();
  const version = (oldData.version || 1) + 1;
  const newData = {
    ...oldData, status: "draft", version, originalId: oldId,
    createdAt: firebase.database.ServerValue.TIMESTAMP,
    createdBy: S.user.uid, createdByName: S.profile?.name || "",
    contributors: { [S.user.uid]: true },
    publishedAt: null, publishedBy: null,
    reviewedBy: null, reviewedByName: null,
  };
  await newRef.set(newData);
  S.checklist = { id: newRef.key, data: newData };
  S.clRef = db.ref("checklists/" + newRef.key);
  toast(`Nova versão criada (v${version}) — original anulado`,"ok");
  setScreen("app");
  setupChecklistListeners();
}

async function showAssignModal(secIdx, itemId) {
  if (!canEdit()) { toast("Documento bloqueado para atribuição","err"); return; }
  const snap = await db.ref("users").once("value");
  const users = snap.val() || {};
  const approvedUsers = Object.entries(users).filter(([,u]) => u.approved || u.isSuperUser || u.isSiteAdmin);
  const isSection = (itemId === null || itemId === undefined);
  const target = isSection
    ? `Seção: ${SECS.find(s=>s[0]===secIdx)?.[2]||secIdx}`
    : `Item: ${ITEMS.find(it=>it[0]===itemId)?.[1]||itemId}`;
  const current = isSection
    ? S.checklist.data?.sectionAssignments?.[secIdx]?.assignedToName
    : S.checklist.data?.items?.[String(itemId).padStart(3,"0")]?.assignedToName;
  const userBtns = approvedUsers.map(([uid,u]) =>
    `<button class="btn btn-sm" style="margin:3px"
      onclick="doAssign('${uid}','${esc(u.name||u.email||uid)}',${secIdx},${itemId===null?'null':itemId})">
      ${esc(u.name||u.email||uid)}</button>`
  ).join("");
  document.getElementById("modal-root").innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" style="max-width:400px">
    <div class="modal-hdr">
      <span class="modal-hdr-title">👤 Atribuir ${isSection?"seção":"item"}</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div style="font-size:12px;color:var(--txt2);margin-bottom:10px">${esc(target)}</div>
      ${current ? `<div style="font-size:12px;margin-bottom:8px">Atribuído atualmente a: <strong>${esc(current)}</strong></div>` : ""}
      <div style="display:flex;flex-wrap:wrap;gap:2px">${userBtns}</div>
      ${current ? `<div style="margin-top:12px">
        <button class="btn btn-danger btn-sm" onclick="doAssign('','',${secIdx},${itemId===null?'null':itemId})">
          ✕ Remover atribuição</button></div>` : ""}
    </div>
  </div></div>`;
}
function doAssign(uid, name, secIdx, itemId) {
  if (!S.clRef) return;
  const myUid = S.user?.uid || "";
  const myName = S.profile?.name || "";
  if (itemId === null || itemId === undefined) {
    if (!uid) {
      S.clRef.child("sectionAssignments/" + secIdx).remove();
    } else {
      S.clRef.child("sectionAssignments/" + secIdx).set({
        assignedTo: uid, assignedToName: name, assignedBy: myUid, assignedByName: myName,
      });
    }
  } else {
    const key = String(itemId).padStart(3,"0");
    if (!uid) {
      S.clRef.child("items/" + key + "/assignedTo").remove();
      S.clRef.child("items/" + key + "/assignedToName").remove();
    } else {
      S.clRef.child("items/" + key).update({
        assignedTo: uid, assignedToName: name, assignedBy: myUid, assignedByName: myName,
      });
    }
  }
  closeModal();
  toast(uid ? "Atribuído a " + name + " ✓" : "Atribuição removida");
}
function closeModal() {
  const r = document.getElementById("modal-root");
  if (r) r.innerHTML = "";
}

async function toggleHiddenSection(el, rrmId, rmaId, ptId) {
  const si = parseInt(el.value);

}

// ── Geração do código único do relatório ───────────────────
async function getOrCreateReportCode() {
  if (S.checklist.data?.reportCode) return S.checklist.data.reportCode;
  const ctx = S.context || {};
  const month = (S.checklist.data?.fields?.mes || new Date().toISOString().slice(0,7)).replace('-','');
  const slug  = (ctx.pointName||'PONTO').replace(/[^a-zA-Z0-9]/g,'').toUpperCase().slice(0,8);
  // Código único sem /reportCodes/ (evita permission_denied nas Security Rules do Firebase)
  const rnd  = Math.random().toString(36).slice(2,6).toUpperCase();
  const code = `${slug}-${month}-${rnd}`;
  // Salvar dentro do checklist — caminho que já tem permissão garantida
  if (S.clRef) await S.clRef.child("reportCode").set(code);
  if (S.checklist.data) S.checklist.data.reportCode = code;
  return code;
}

async function getNextPrintCount(code) {
  // Contador de impressões dentro do próprio checklist (sem /reports/ separado)
  if (S.clRef) {
    const snap = await S.clRef.child("printCount").once("value");
    const n = (snap.val() || 0) + 1;
    await S.clRef.child("printCount").set(n);
    await S.clRef.child("printAt").set(new Date().toISOString());
    if (S.checklist.data) S.checklist.data.printCount = n;
    return n;
  }
  // Fallback local (quando S.clRef não disponível)
  const n = (S.checklist.data?.printCount || 0) + 1;
  if (S.checklist.data) S.checklist.data.printCount = n;
  return n;
}

function ordinal(n) {
  const s = ["1ª","2ª","3ª","4ª","5ª","6ª","7ª","8ª","9ª","10ª"];
  return (s[n-1] || n+"ª");
}
